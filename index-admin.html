    // ============================================
    // NOTIFICATIONS SECTION
    // ============================================
    function NotificationsSection() {
      const { sermons, events, announcements, seminars, notificationLogs, setNotificationLogs, sundaySettings, setSundaySettings } = useAdmin();
      const [sending, setSending] = useState(false);
      const [savingSettings, setSavingSettings] = useState(false);
      const [activeTab, setActiveTab] = useState('send'); // 'send' | 'sunday' | 'history'

      // Form state for manual notification
      const [notifType, setNotifType] = useState('sermon');
      const [selectedContent, setSelectedContent] = useState('');
      const [customTitle, setCustomTitle] = useState('');
      const [customBody, setCustomBody] = useState('');

      // Sunday settings form
      const [sundayForm, setSundayForm] = useState(sundaySettings || {
        enabled: true,
        notification_time: '09:00:00',
        title: 'Culte du Dimanche',
        body: 'Rejoignez-nous ce dimanche pour le culte. Que Dieu vous bénisse!'
      });

      useEffect(() => {
        if (sundaySettings) {
          setSundayForm(sundaySettings);
        }
      }, [sundaySettings]);

      // Get content options based on type
      const getContentOptions = () => {
        switch (notifType) {
          case 'sermon':
            return sermons.slice(0, 20).map(s => ({ id: s.id, label: s.title }));
          case 'event':
            return events.slice(0, 20).map(e => ({ id: e.id, label: e.title }));
          case 'announcement':
            return announcements.slice(0, 20).map(a => ({ id: a.id, label: a.title }));
          case 'seminar':
            return seminars.slice(0, 20).map(s => ({ id: s.id, label: s.title }));
          default:
            return [];
        }
      };

      // Auto-fill title and body when content is selected
      useEffect(() => {
        if (!selectedContent || notifType === 'custom') return;

        let content;
        switch (notifType) {
          case 'sermon':
            content = sermons.find(s => s.id === selectedContent);
            if (content) {
              setCustomTitle(`Nouvelle prédication : ${content.title}`);
              setCustomBody(content.speaker ? `Par ${content.speaker}` : 'Écoutez maintenant');
            }
            break;
          case 'event':
            content = events.find(e => e.id === selectedContent);
            if (content) {
              setCustomTitle(`Événement : ${content.title}`);
              setCustomBody(content.description?.slice(0, 100) || 'Découvrez cet événement');
            }
            break;
          case 'announcement':
            content = announcements.find(a => a.id === selectedContent);
            if (content) {
              setCustomTitle(content.title);
              setCustomBody(content.content?.slice(0, 100) || '');
            }
            break;
          case 'seminar':
            content = seminars.find(s => s.id === selectedContent);
            if (content) {
              setCustomTitle(`Nouveau séminaire : ${content.title}`);
              setCustomBody(content.description?.slice(0, 100) || 'Découvrez ce séminaire');
            }
            break;
        }
      }, [selectedContent, notifType, sermons, events, announcements, seminars]);

      const handleSendNotification = async () => {
        if (!customTitle || !customBody) {
          alert('Veuillez remplir le titre et le message');
          return;
        }

        if (!confirm(`Envoyer la notification "${customTitle}" à tous les appareils ?`)) return;

        setSending(true);
        try {
          const sb = initSupabase();

          const response = await fetch(`${SUPABASE_URL}/functions/v1/send-push-notification`, {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
              'Authorization': `Bearer ${SUPABASE_ANON_KEY}`,
            },
            body: JSON.stringify({
              title: customTitle,
              body: customBody,
              type: notifType,
              contentId: selectedContent || undefined,
            }),
          });

          const result = await response.json();

          if (result.error) {
            throw new Error(result.error);
          }

          alert(`Notification envoyée!\nEnvoyés: ${result.sent}\nÉchecs: ${result.failed}`);

          // Refresh logs
          const { data: logsData } = await sb.from('notification_logs').select('*').order('created_at', { ascending: false }).limit(50);
          if (logsData) setNotificationLogs(logsData);

          // Reset form
          setSelectedContent('');
          setCustomTitle('');
          setCustomBody('');
        } catch (error) {
          console.error('Error sending notification:', error);
          alert('Erreur: ' + error.message);
        } finally {
          setSending(false);
        }
      };

      const handleSaveSundaySettings = async () => {
        setSavingSettings(true);
        try {
          const sb = initSupabase();

          const { error } = await sb
            .from('sunday_notification_settings')
            .upsert({
              id: 'default',
              ...sundayForm,
              updated_at: new Date().toISOString()
            });

          if (error) throw error;

          setSundaySettings(sundayForm);
          alert('Paramètres sauvegardés!');
        } catch (error) {
          console.error('Error saving sunday settings:', error);
          alert('Erreur: ' + error.message);
        } finally {
          setSavingSettings(false);
        }
      };

      const getTypeLabel = (type) => {
        const labels = {
          sermon: 'Prédication',
          event: 'Événement',
          announcement: 'Annonce',
          seminar: 'Séminaire',
          sunday_service: 'Culte Dominical',
          custom: 'Personnalisé'
        };
        return labels[type] || type;
      };

      const getTypeColor = (type) => {
        const colors = {
          sermon: 'bg-purple-100 text-purple-800 dark:bg-purple-900/30 dark:text-purple-300',
          event: 'bg-green-100 text-green-800 dark:bg-green-900/30 dark:text-green-300',
          announcement: 'bg-yellow-100 text-yellow-800 dark:bg-yellow-900/30 dark:text-yellow-300',
          seminar: 'bg-blue-100 text-blue-800 dark:bg-blue-900/30 dark:text-blue-300',
          sunday_service: 'bg-red-100 text-red-800 dark:bg-red-900/30 dark:text-red-300',
          custom: 'bg-slate-100 text-slate-800 dark:bg-slate-900/30 dark:text-slate-300'
        };
        return colors[type] || colors.custom;
      };

      return (
        <div>
          <div className="flex items-center justify-between mb-6">
            <div>
              <h2 className="text-2xl font-bold text-slate-900 dark:text-white">Notifications Push</h2>
              <p className="text-slate-600 dark:text-slate-400 mt-1">Envoyez des notifications aux utilisateurs de l'application</p>
            </div>
          </div>

          {/* Tabs */}
          <div className="flex gap-2 mb-6">
            <button
              onClick={() => setActiveTab('send')}
              className={cls(
                "px-4 py-2 rounded-lg font-medium transition",
                activeTab === 'send'
                  ? "bg-blue-600 text-white"
                  : "bg-slate-200 dark:bg-slate-800 text-slate-700 dark:text-slate-300"
              )}
            >
              Envoyer
            </button>
            <button
              onClick={() => setActiveTab('sunday')}
              className={cls(
                "px-4 py-2 rounded-lg font-medium transition",
                activeTab === 'sunday'
                  ? "bg-blue-600 text-white"
                  : "bg-slate-200 dark:bg-slate-800 text-slate-700 dark:text-slate-300"
              )}
            >
              Dimanche
            </button>
            <button
              onClick={() => setActiveTab('history')}
              className={cls(
                "px-4 py-2 rounded-lg font-medium transition",
                activeTab === 'history'
                  ? "bg-blue-600 text-white"
                  : "bg-slate-200 dark:bg-slate-800 text-slate-700 dark:text-slate-300"
              )}
            >
              Historique
            </button>
          </div>

          {/* Send Tab */}
          {activeTab === 'send' && (
            <div className="bg-white dark:bg-slate-900 rounded-xl border border-slate-200 dark:border-slate-800 p-6">
              <h3 className="text-lg font-semibold text-slate-900 dark:text-white mb-4">Envoyer une notification</h3>

              <div className="space-y-4">
                {/* Type Selection */}
                <div>
                  <label className="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-2">Type de notification</label>
                  <select
                    value={notifType}
                    onChange={(e) => { setNotifType(e.target.value); setSelectedContent(''); }}
                    className="w-full px-4 py-2 rounded-lg border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-800 text-slate-900 dark:text-white"
                  >
                    <option value="sermon">Prédication</option>
                    <option value="event">Événement</option>
                    <option value="announcement">Annonce</option>
                    <option value="seminar">Séminaire</option>
                    <option value="custom">Personnalisé</option>
                  </select>
                </div>

                {/* Content Selection (if not custom) */}
                {notifType !== 'custom' && (
                  <div>
                    <label className="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-2">
                      Sélectionner le contenu (optionnel)
                    </label>
                    <select
                      value={selectedContent}
                      onChange={(e) => setSelectedContent(e.target.value)}
                      className="w-full px-4 py-2 rounded-lg border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-800 text-slate-900 dark:text-white"
                    >
                      <option value="">-- Sélectionner --</option>
                      {getContentOptions().map(opt => (
                        <option key={opt.id} value={opt.id}>{opt.label}</option>
                      ))}
                    </select>
                  </div>
                )}

                {/* Title */}
                <div>
                  <label className="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-2">Titre *</label>
                  <input
                    type="text"
                    value={customTitle}
                    onChange={(e) => setCustomTitle(e.target.value)}
                    placeholder="Titre de la notification"
                    className="w-full px-4 py-2 rounded-lg border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-800 text-slate-900 dark:text-white"
                  />
                </div>

                {/* Body */}
                <div>
                  <label className="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-2">Message *</label>
                  <textarea
                    value={customBody}
                    onChange={(e) => setCustomBody(e.target.value)}
                    placeholder="Contenu de la notification"
                    rows={3}
                    className="w-full px-4 py-2 rounded-lg border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-800 text-slate-900 dark:text-white"
                  />
                </div>

                {/* Send Button */}
                <button
                  onClick={handleSendNotification}
                  disabled={sending || !customTitle || !customBody}
                  className={cls(
                    "w-full py-3 rounded-lg font-semibold transition",
                    sending || !customTitle || !customBody
                      ? "bg-slate-300 dark:bg-slate-700 text-slate-500 cursor-not-allowed"
                      : "bg-blue-600 text-white hover:bg-blue-700"
                  )}
                >
                  {sending ? 'Envoi en cours...' : 'Envoyer la notification'}
                </button>
              </div>
            </div>
          )}

          {/* Sunday Tab */}
          {activeTab === 'sunday' && (
            <div className="bg-white dark:bg-slate-900 rounded-xl border border-slate-200 dark:border-slate-800 p-6">
              <h3 className="text-lg font-semibold text-slate-900 dark:text-white mb-4">Notification du Dimanche</h3>
              <p className="text-slate-600 dark:text-slate-400 text-sm mb-6">
                Cette notification est envoyée automatiquement chaque dimanche.
              </p>

              <div className="space-y-4">
                {/* Enable/Disable */}
                <div className="flex items-center gap-3">
                  <input
                    type="checkbox"
                    id="sundayEnabled"
                    checked={sundayForm.enabled}
                    onChange={(e) => setSundayForm(prev => ({ ...prev, enabled: e.target.checked }))}
                    className="w-5 h-5 rounded border-slate-300"
                  />
                  <label htmlFor="sundayEnabled" className="text-slate-700 dark:text-slate-300 font-medium">
                    Activer la notification du dimanche
                  </label>
                </div>

                {/* Time */}
                <div>
                  <label className="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-2">
                    Heure d'envoi
                  </label>
                  <input
                    type="time"
                    value={sundayForm.notification_time?.slice(0, 5) || '09:00'}
                    onChange={(e) => setSundayForm(prev => ({ ...prev, notification_time: e.target.value + ':00' }))}
                    className="px-4 py-2 rounded-lg border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-800 text-slate-900 dark:text-white"
                  />
                </div>

                {/* Title */}
                <div>
                  <label className="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-2">Titre</label>
                  <input
                    type="text"
                    value={sundayForm.title}
                    onChange={(e) => setSundayForm(prev => ({ ...prev, title: e.target.value }))}
                    placeholder="Culte du Dimanche"
                    className="w-full px-4 py-2 rounded-lg border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-800 text-slate-900 dark:text-white"
                  />
                </div>

                {/* Body */}
                <div>
                  <label className="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-2">Message</label>
                  <textarea
                    value={sundayForm.body}
                    onChange={(e) => setSundayForm(prev => ({ ...prev, body: e.target.value }))}
                    placeholder="Rejoignez-nous ce dimanche..."
                    rows={3}
                    className="w-full px-4 py-2 rounded-lg border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-800 text-slate-900 dark:text-white"
                  />
                </div>

                {/* Save Button */}
                <button
                  onClick={handleSaveSundaySettings}
                  disabled={savingSettings}
                  className={cls(
                    "w-full py-3 rounded-lg font-semibold transition",
                    savingSettings
                      ? "bg-slate-300 dark:bg-slate-700 text-slate-500"
                      : "bg-green-600 text-white hover:bg-green-700"
                  )}
                >
                  {savingSettings ? 'Sauvegarde...' : 'Sauvegarder les paramètres'}
                </button>
              </div>
            </div>
          )}

          {/* History Tab */}
          {activeTab === 'history' && (
            <div className="bg-white dark:bg-slate-900 rounded-xl border border-slate-200 dark:border-slate-800 overflow-hidden">
              <div className="p-4 border-b border-slate-200 dark:border-slate-800">
                <h3 className="text-lg font-semibold text-slate-900 dark:text-white">Historique des notifications</h3>
              </div>

              {notificationLogs.length === 0 ? (
                <div className="p-8 text-center text-slate-500">
                  Aucune notification envoyée
                </div>
              ) : (
                <div className="divide-y divide-slate-200 dark:divide-slate-800">
                  {notificationLogs.map(log => (
                    <div key={log.id} className="p-4 hover:bg-slate-50 dark:hover:bg-slate-800/50">
                      <div className="flex items-start justify-between gap-4">
                        <div className="flex-1 min-w-0">
                          <div className="flex items-center gap-2 mb-1">
                            <span className={cls("px-2 py-0.5 rounded-full text-xs font-medium", getTypeColor(log.type))}>

                            </span>

                          )}

                  ))}

              )}

    // ============================================
    // SETTINGS SECTION
    // ============================================
    function SettingsSection() {
      const { settings, setSettings } = useAdmin();
      const [saving, setSaving] = useState(false);
      const [formData, setFormData] = useState(settings || {
        sunday_service_title: "Culte de Louange et d'Adoration",
        sunday_service_time: 'Dimanche à 10h00',
        sunday_service_label: 'Ce Dimanche',
        sunday_service_badge: 'Bientôt',
        hero_title_line1: 'Église Missionnaire',
        hero_title_line2: 'Christ est Roi',
        hero_verse: '"Car là où deux ou trois sont assemblés en mon nom, je suis au milieu d\'eux."',
        hero_verse_reference: 'Matthieu 18:20',
      });

      useEffect(() => {
        if (settings) {
          setFormData(settings);
        }
      }, [settings]);

      const handleSave = async () => {
        setSaving(true);
        const sb = initSupabase();

        const dataToSave = {
          ...formData,
          updated_at: new Date().toISOString(),
        };

        // Essayer d'abord de mettre à jour
        const { data: existingData } = await sb.from('church_settings').select('id').single();

        let error;
        if (existingData) {
          // Mettre à jour
          ({ error } = await sb.from('church_settings').update(dataToSave).eq('id', existingData.id));
        } else {
          // Insérer
          ({ error } = await sb.from('church_settings').insert([{ ...dataToSave, id: crypto.randomUUID() }]));
        }

        setSaving(false);

        if (error) {
          alert('Erreur: ' + error.message);
        } else {
          setSettings(dataToSave);
          alert('Paramètres enregistrés avec succès !');
        }
      };

      return (
        <div>
          <div className="flex items-center justify-between mb-6">
            <div>
              <h2 className="text-2xl font-bold text-slate-900 dark:text-white">
                Paramètres de l'application
              </h2>
              <p className="text-sm text-slate-600 dark:text-slate-400 mt-1">
                Modifiez les textes affichés sur la page d'accueil
              </p>
            </div>
            <button
              onClick={handleSave}
              disabled={saving}
              className="px-6 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition font-medium disabled:opacity-50"
            >
              {saving ? 'Enregistrement...' : 'Enregistrer'}
            </button>
          </div>

          <div className="grid gap-6">
            {/* Section Hero */}
            <div className="bg-white dark:bg-slate-900 rounded-lg border border-slate-200 dark:border-slate-800 p-6">
              <h3 className="text-lg font-bold text-slate-900 dark:text-white mb-4 flex items-center gap-2">
                <span className="w-8 h-8 rounded-lg bg-blue-100 dark:bg-blue-900/30 text-blue-600 dark:text-blue-400 flex items-center justify-center text-sm">1</span>
                Section Hero (En-tête)
              </h3>

              <div className="grid md:grid-cols-2 gap-4">
                <div>
                  <label className="block text-sm font-medium mb-2 text-slate-900 dark:text-white">
                    Titre ligne 1
                  </label>
                  <input
                    type="text"
                    value={formData.hero_title_line1 || ''}
                    onChange={e => setFormData({...formData, hero_title_line1: e.target.value})}
                    placeholder="ex: Église Missionnaire"
                    className="w-full px-4 py-2 rounded-lg border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-950 text-slate-900 dark:text-white"
                  />
                </div>
                <div>
                  <label className="block text-sm font-medium mb-2 text-slate-900 dark:text-white">
                    Titre ligne 2
                  </label>
                  <input
                    type="text"
                    value={formData.hero_title_line2 || ''}
                    onChange={e => setFormData({...formData, hero_title_line2: e.target.value})}
                    placeholder="ex: Christ est Roi"
                    className="w-full px-4 py-2 rounded-lg border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-950 text-slate-900 dark:text-white"
                  />
                </div>
                <div className="md:col-span-2">
                  <label className="block text-sm font-medium mb-2 text-slate-900 dark:text-white">
                    Verset biblique
                  </label>
                  <textarea
                    value={formData.hero_verse || ''}
                    onChange={e => setFormData({...formData, hero_verse: e.target.value})}
                    placeholder="ex: Car là où deux ou trois sont assemblés en mon nom..."
                    rows={2}
                    className="w-full px-4 py-2 rounded-lg border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-950 text-slate-900 dark:text-white"
                  />
                </div>
                <div>
                  <label className="block text-sm font-medium mb-2 text-slate-900 dark:text-white">
                    Référence du verset
                  </label>
                  <input
                    type="text"
                    value={formData.hero_verse_reference || ''}
                    onChange={e => setFormData({...formData, hero_verse_reference: e.target.value})}
                    placeholder="ex: Matthieu 18:20"
                    className="w-full px-4 py-2 rounded-lg border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-950 text-slate-900 dark:text-white"
                  />
                </div>
              </div>
            </div>

            {/* Section Ce Dimanche */}
            <div className="bg-white dark:bg-slate-900 rounded-lg border border-slate-200 dark:border-slate-800 p-6">
              <h3 className="text-lg font-bold text-slate-900 dark:text-white mb-4 flex items-center gap-2">
                <span className="w-8 h-8 rounded-lg bg-green-100 dark:bg-green-900/30 text-green-600 dark:text-green-400 flex items-center justify-center text-sm">2</span>
                Bloc "Ce Dimanche"
              </h3>

              <div className="grid md:grid-cols-2 gap-4">
                <div>
                  <label className="block text-sm font-medium mb-2 text-slate-900 dark:text-white">
                    Label (petit texte)
                  </label>
                  <input
                    type="text"
                    value={formData.sunday_service_label || ''}
                    onChange={e => setFormData({...formData, sunday_service_label: e.target.value})}
                    placeholder="ex: Ce Dimanche"
                    className="w-full px-4 py-2 rounded-lg border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-950 text-slate-900 dark:text-white"
                  />
                </div>
                <div>
                  <label className="block text-sm font-medium mb-2 text-slate-900 dark:text-white">
                    Badge (pastille)
                  </label>
                  <input
                    type="text"
                    value={formData.sunday_service_badge || ''}
                    onChange={e => setFormData({...formData, sunday_service_badge: e.target.value})}
                    placeholder="ex: Bientôt, En direct, etc."
                    className="w-full px-4 py-2 rounded-lg border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-950 text-slate-900 dark:text-white"
                  />
                </div>
                <div className="md:col-span-2">
                  <label className="block text-sm font-medium mb-2 text-slate-900 dark:text-white">
                    Titre du culte
                  </label>
                  <input
                    type="text"
                    value={formData.sunday_service_title || ''}
                    onChange={e => setFormData({...formData, sunday_service_title: e.target.value})}
                    placeholder="ex: Culte de Louange et d'Adoration"
                    className="w-full px-4 py-2 rounded-lg border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-950 text-slate-900 dark:text-white"
                  />
                </div>
                <div>
                  <label className="block text-sm font-medium mb-2 text-slate-900 dark:text-white">
                    Horaire
                  </label>
                  <input
                    type="text"
                    value={formData.sunday_service_time || ''}
                    onChange={e => setFormData({...formData, sunday_service_time: e.target.value})}
                    placeholder="ex: Dimanche à 10h00"
                    className="w-full px-4 py-2 rounded-lg border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-950 text-slate-900 dark:text-white"
                  />
                </div>
              </div>
            </div>

            {/* Aperçu */}
            <div className="bg-gradient-to-br from-blue-50 to-indigo-50 dark:from-slate-800 dark:to-slate-900 rounded-lg border border-blue-200 dark:border-slate-700 p-6">
              <h3 className="text-lg font-bold text-slate-900 dark:text-white mb-4">
                Aperçu
              </h3>
              <div className="bg-white dark:bg-slate-950 rounded-lg p-4 shadow-inner">
                <div className="text-center mb-4">
                  <p className="text-xl font-bold text-slate-900 dark:text-white">{formData.hero_title_line1}</p>
                  <p className="text-xl font-bold text-slate-900 dark:text-white">{formData.hero_title_line2}</p>
                  <p className="text-sm text-slate-600 dark:text-slate-400 italic mt-2">{formData.hero_verse}</p>
                  <p className="text-xs text-slate-500 dark:text-slate-500">{formData.hero_verse_reference}</p>
                </div>
                <div className="flex items-center gap-3 p-3 bg-slate-50 dark:bg-slate-900 rounded-lg">
                  <div className="w-10 h-10 bg-blue-600 rounded-lg flex items-center justify-center">
                    <CalendarIcon />
                  </div>
                  <div className="flex-1">
                    <div className="flex items-center gap-2">
                      <span className="text-sm font-medium text-blue-600">{formData.sunday_service_label}</span>
                      <span className="px-2 py-0.5 bg-green-500 text-white text-xs rounded-full">{formData.sunday_service_badge}</span>
                    </div>
                    <p className="font-semibold text-slate-900 dark:text-white">{formData.sunday_service_title}</p>
                    <p className="text-sm text-slate-600 dark:text-slate-400">{formData.sunday_service_time}</p>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      );
    }

    // ============================================
    // RENDER APP
    // ============================================
    ReactDOM.createRoot(document.getElementById('root')).render(<AppWrapper />);
  </script>
</body>
</html>
