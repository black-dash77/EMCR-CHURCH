    const SESSION_DURATION = 24 * 60 * 60 * 1000; // 24 heures

    const hashPassword = async (password) => {
      const encoder = new TextEncoder();
      const data = encoder.encode(password + 'emcr_salt_2024');
      const hashBuffer = await crypto.subtle.digest('SHA-256', data);
      const hashArray = Array.from(new Uint8Array(hashBuffer));
      return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
    };

    const checkSession = () => {
      const session = localStorage.getItem(SESSION_KEY);
      if (!session) return false;
      try {
        const { expiry } = JSON.parse(session);
        return Date.now() < expiry;
      } catch {
        return false;
      }
    };

    const createSession = () => {
      const session = {
        expiry: Date.now() + SESSION_DURATION,
        created: Date.now()
      };
      localStorage.setItem(SESSION_KEY, JSON.stringify(session));
    };

    const clearSession = () => {
      localStorage.removeItem(SESSION_KEY);

    const formatDate = (date) => {
      const d = typeof date === 'string' ? new Date(date) : date;
      return d.toLocaleDateString('fr-FR', { year: 'numeric', month: '2-digit', day: '2-digit' });

    // ============================================
    // LOGIN SCREEN
    // ============================================
    function LoginScreen({ onLogin }) {
      const [password, setPassword] = useState('');
      const [error, setError] = useState('');
      const [loading, setLoading] = useState(false);
      const [isFirstSetup, setIsFirstSetup] = useState(false);
      const [confirmPassword, setConfirmPassword] = useState('');

      useEffect(() => {
        const hasPassword = localStorage.getItem(ADMIN_PASSWORD_HASH_KEY);
        setIsFirstSetup(!hasPassword);
      }, []);

      const handleSubmit = async (e) => {
        e.preventDefault();
        setError('');
        setLoading(true);

        try {
          const hashedInput = await hashPassword(password);

          if (isFirstSetup) {
            if (password.length < 6) {
              setError('Le mot de passe doit contenir au moins 6 caractères');
              setLoading(false);
              return;
            }
            if (password !== confirmPassword) {
              setError('Les mots de passe ne correspondent pas');
              setLoading(false);
              return;
            }
            localStorage.setItem(ADMIN_PASSWORD_HASH_KEY, hashedInput);
            createSession();
            onLogin();
          } else {
            const storedHash = localStorage.getItem(ADMIN_PASSWORD_HASH_KEY);
            if (hashedInput === storedHash) {
              createSession();
              onLogin();
            } else {
              setError('Mot de passe incorrect');
            }
          }
        } catch (err) {
          setError('Erreur lors de la connexion');
        }

        setLoading(false);
      };

      return (
        <div className="min-h-screen flex items-center justify-center bg-gradient-to-br from-slate-100 to-slate-200 dark:from-slate-900 dark:to-slate-950 p-4">
          <div className="w-full max-w-md">
            <div className="bg-white dark:bg-slate-900 rounded-2xl shadow-xl border border-slate-200 dark:border-slate-800 overflow-hidden">
              <div className="bg-gradient-to-r from-blue-600 to-indigo-600 p-6 text-center">
                <div className="w-16 h-16 bg-white/20 rounded-full flex items-center justify-center mx-auto mb-4">
                  <svg className="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
                  </svg>
                </div>
                <h1 className="text-2xl font-bold text-white">Administration EMCR</h1>
                <p className="text-blue-100 mt-1">
                  {isFirstSetup ? 'Configuration initiale' : 'Connexion requise'}
                </p>
              </div>

              <form onSubmit={handleSubmit} className="p-6 space-y-4">
                {isFirstSetup && (
                  <div className="bg-blue-50 dark:bg-blue-900/20 border border-blue-200 dark:border-blue-800 rounded-lg p-4 mb-4">
                    <p className="text-sm text-blue-800 dark:text-blue-200">
                      <strong>Première connexion :</strong> Créez votre mot de passe administrateur.
                    </p>
                  </div>
                )}

                <div>
                  <label className="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-2">
                    Mot de passe
                  </label>
                  <input
                    type="password"
                    value={password}
                    onChange={(e) => setPassword(e.target.value)}
                    placeholder={isFirstSetup ? 'Créer un mot de passe' : 'Entrez votre mot de passe'}
                    className="w-full px-4 py-3 rounded-lg border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-950 text-slate-900 dark:text-white focus:ring-2 focus:ring-blue-500 transition"
                    required
                    autoFocus
                  />
                </div>

                {isFirstSetup && (
                  <div>
                    <label className="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-2">
                      Confirmer le mot de passe
                    </label>
                    <input
                      type="password"
                      value={confirmPassword}
                      onChange={(e) => setConfirmPassword(e.target.value)}
                      placeholder="Confirmez le mot de passe"
                      className="w-full px-4 py-3 rounded-lg border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-950 text-slate-900 dark:text-white focus:ring-2 focus:ring-blue-500 transition"
                      required
                    />
                  </div>
                )}

                {error && (
                  <div className="bg-red-50 dark:bg-red-900/20 border border-red-200 dark:border-red-800 rounded-lg p-3">
                    <p className="text-sm text-red-600 dark:text-red-400 flex items-center gap-2">
                      <AlertIcon />
                      {error}
                    </p>
                  </div>
                )}

                <button
                  type="submit"
                  disabled={loading}
                  className="w-full py-3 bg-blue-600 hover:bg-blue-700 text-white font-medium rounded-lg transition disabled:opacity-50 flex items-center justify-center gap-2"
                >
                  {loading ? (
                    <>
                      <div className="w-5 h-5 border-2 border-white border-t-transparent rounded-full animate-spin"></div>
                      Connexion...
                    </>
                  ) : (
                    isFirstSetup ? 'Créer et accéder' : 'Se connecter'
                  )}
                </button>
              </form>

              <div className="px-6 pb-6">
                <p className="text-xs text-center text-slate-500 dark:text-slate-400">
                  Session valide pendant 24 heures
                </p>
              </div>
            </div>
          </div>
        </div>
      );
    }

    // ============================================
    // APP WRAPPER WITH AUTH
    // ============================================
    function AppWrapper() {
      const [isAuthenticated, setIsAuthenticated] = useState(() => checkSession());

      const handleLogin = () => setIsAuthenticated(true);
      const handleLogout = () => {
        clearSession();
        setIsAuthenticated(false);
      };

      if (!isAuthenticated) {
        return <LoginScreen onLogin={handleLogin} />;
      }

      return <AdminApp onLogout={handleLogout} />;
    }

    // ============================================
    // MAIN ADMIN APP
    // ============================================
    function AdminApp({ onLogout }) {
      const [darkMode, setDarkMode] = useState(() => {
        const saved = localStorage.getItem('darkMode');
        return saved ? JSON.parse(saved) : false;
      });
      
      const [activeSection, setActiveSection] = useState('sermons');
      const [loading, setLoading] = useState(true);
      
      const [sermons, setSermons] = useState([]);
      const [events, setEvents] = useState([]);
      const [announcements, setAnnouncements] = useState([]);
      const [members, setMembers] = useState([]);
      const [medias, setMedias] = useState([]);
      const [messages, setMessages] = useState([]);
      const [ministries, setMinistries] = useState([]);
      const [speakers, setSpeakers] = useState([]);
      const [seminars, setSeminars] = useState([]);
      const [settings, setSettings] = useState(null);
      const [churchInfo, setChurchInfo] = useState(null);
      const [notificationLogs, setNotificationLogs] = useState([]);
      const [sundaySettings, setSundaySettings] = useState(null);

      useEffect(() => {
        document.documentElement.classList.toggle('dark', darkMode);
        localStorage.setItem('darkMode', JSON.stringify(darkMode));
      }, [darkMode]);

      useEffect(() => {
        let sermonsChannel, eventsChannel, announcementsChannel, membersChannel, mediasChannel, messagesChannel, ministriesChannel, speakersChannel, seminarsChannel;

        const loadAllData = async () => {
          try {
            const sb = initSupabase();

            if (!sb) {
              console.log('Supabase not initialized');
              setLoading(false);
              return;
            }

            setLoading(true);

            const { data: sermonsData } = await sb.from('sermons').select('*').order('date', { ascending: false });
            if (sermonsData) setSermons(sermonsData);

            const { data: eventsData } = await sb.from('events').select('*').order('date', { ascending: true });
            if (eventsData) setEvents(eventsData);

            const { data: announcementsData } = await sb.from('announcements').select('*').order('date', { ascending: false });
            if (announcementsData) setAnnouncements(announcementsData);

            const { data: membersData } = await sb.from('members').select('*').order('name', { ascending: true });
            if (membersData) setMembers(membersData);

            const { data: mediasData } = await sb.from('photos').select('*').order('created_at', { ascending: false });
            if (mediasData) setMedias(mediasData);

            const { data: messagesData } = await sb.from('contact_messages').select('*').order('created_at', { ascending: false });
            if (messagesData) setMessages(messagesData);

            const { data: ministriesData } = await sb.from('ministries').select('*').order('display_order', { ascending: true });
            if (ministriesData) setMinistries(ministriesData);

            const { data: speakersData } = await sb.from('speakers').select('*').order('name', { ascending: true });
            if (speakersData) setSpeakers(speakersData);

            const { data: seminarsData } = await sb.from('seminars').select('*, speaker:speakers(*)').order('created_at', { ascending: false });
            if (seminarsData) setSeminars(seminarsData);

            const { data: settingsData } = await sb.from('church_settings').select('*').single();
            if (settingsData) {
              setSettings(settingsData);
            } else {
              // Créer les paramètres par défaut s'ils n'existent pas
              setSettings({
                id: 'default',
                sunday_service_title: "Culte de Louange et d'Adoration",
                sunday_service_time: 'Dimanche à 10h00',
                sunday_service_label: 'Ce Dimanche',
                sunday_service_badge: 'Bientôt',
                hero_title_line1: 'Église Missionnaire',
                hero_title_line2: 'Christ est Roi',
                hero_verse: '"Car là où deux ou trois sont assemblés en mon nom, je suis au milieu d\'eux."',
                hero_verse_reference: 'Matthieu 18:20',
              });
            }

            // Charger les informations de l'église
            const { data: churchInfoData } = await sb.from('church_info').select('*').single();
            if (churchInfoData) {
              setChurchInfo(churchInfoData);
            }

            // Charger les logs de notifications
            const { data: notificationLogsData } = await sb.from('notification_logs').select('*').order('created_at', { ascending: false }).limit(50);
            if (notificationLogsData) setNotificationLogs(notificationLogsData);

            // Charger les paramètres de notification du dimanche
            const { data: sundaySettingsData } = await sb.from('sunday_notification_settings').select('*').eq('id', 'default').single();
            if (sundaySettingsData) {
              setSundaySettings(sundaySettingsData);
            } else {
              setSundaySettings({
                id: 'default',
                enabled: true,
                notification_time: '09:00:00',
                title: 'Culte du Dimanche',
                body: 'Rejoignez-nous ce dimanche pour le culte. Que Dieu vous bénisse!'
              });
            }

            sermonsChannel = sb.channel('sermons-admin').on('postgres_changes', { event: '*', schema: 'public', table: 'sermons' }, (payload) => {
              if (payload.eventType === 'INSERT') setSermons(prev => [payload.new, ...prev]);
              else if (payload.eventType === 'UPDATE') setSermons(prev => prev.map(s => s.id === payload.new.id ? payload.new : s));
              else if (payload.eventType === 'DELETE') setSermons(prev => prev.filter(s => s.id !== payload.old.id));
            }).subscribe();

            eventsChannel = sb.channel('events-admin').on('postgres_changes', { event: '*', schema: 'public', table: 'events' }, (payload) => {
              if (payload.eventType === 'INSERT') setEvents(prev => [...prev, payload.new].sort((a,b) => new Date(a.date) - new Date(b.date)));
              else if (payload.eventType === 'UPDATE') setEvents(prev => prev.map(e => e.id === payload.new.id ? payload.new : e));
              else if (payload.eventType === 'DELETE') setEvents(prev => prev.filter(e => e.id !== payload.old.id));
            }).subscribe();

            announcementsChannel = sb.channel('announcements-admin').on('postgres_changes', { event: '*', schema: 'public', table: 'announcements' }, (payload) => {
              if (payload.eventType === 'INSERT') setAnnouncements(prev => [payload.new, ...prev]);
              else if (payload.eventType === 'UPDATE') setAnnouncements(prev => prev.map(a => a.id === payload.new.id ? payload.new : a));
              else if (payload.eventType === 'DELETE') setAnnouncements(prev => prev.filter(a => a.id !== payload.old.id));
            }).subscribe();

            membersChannel = sb.channel('members-admin').on('postgres_changes', { event: '*', schema: 'public', table: 'members' }, (payload) => {
              if (payload.eventType === 'INSERT') setMembers(prev => [...prev, payload.new].sort((a,b) => a.name.localeCompare(b.name)));
              else if (payload.eventType === 'UPDATE') setMembers(prev => prev.map(m => m.id === payload.new.id ? payload.new : m));
              else if (payload.eventType === 'DELETE') setMembers(prev => prev.filter(m => m.id !== payload.old.id));
            }).subscribe();

            mediasChannel = sb.channel('medias-admin').on('postgres_changes', { event: '*', schema: 'public', table: 'photos' }, (payload) => {
              if (payload.eventType === 'INSERT') setMedias(prev => [payload.new, ...prev]);
              else if (payload.eventType === 'UPDATE') setMedias(prev => prev.map(p => p.id === payload.new.id ? payload.new : p));
              else if (payload.eventType === 'DELETE') setMedias(prev => prev.filter(p => p.id !== payload.old.id));
            }).subscribe();

            messagesChannel = sb.channel('messages-admin').on('postgres_changes', { event: '*', schema: 'public', table: 'contact_messages' }, (payload) => {
              if (payload.eventType === 'INSERT') setMessages(prev => [payload.new, ...prev]);
              else if (payload.eventType === 'UPDATE') setMessages(prev => prev.map(m => m.id === payload.new.id ? payload.new : m));
              else if (payload.eventType === 'DELETE') setMessages(prev => prev.filter(m => m.id !== payload.old.id));
            }).subscribe();

            ministriesChannel = sb.channel('ministries-admin').on('postgres_changes', { event: '*', schema: 'public', table: 'ministries' }, (payload) => {
              if (payload.eventType === 'INSERT') {
                setMinistries(prev => [...prev, payload.new].sort((a,b) => a.display_order - b.display_order));
              } else if (payload.eventType === 'UPDATE') {
                setMinistries(prev => prev.map(m => m.id === payload.new.id ? payload.new : m).sort((a,b) => a.display_order - b.display_order));
              } else if (payload.eventType === 'DELETE') {
                setMinistries(prev => prev.filter(m => m.id !== payload.old.id));
              }
            }).subscribe();

            speakersChannel = sb.channel('speakers-admin').on('postgres_changes', { event: '*', schema: 'public', table: 'speakers' }, (payload) => {
              if (payload.eventType === 'INSERT') {
                setSpeakers(prev => [...prev, payload.new].sort((a,b) => a.name.localeCompare(b.name)));
              } else if (payload.eventType === 'UPDATE') {
                setSpeakers(prev => prev.map(s => s.id === payload.new.id ? payload.new : s));
              } else if (payload.eventType === 'DELETE') {
                setSpeakers(prev => prev.filter(s => s.id !== payload.old.id));
              }
            }).subscribe();

            seminarsChannel = sb.channel('seminars-admin').on('postgres_changes', { event: '*', schema: 'public', table: 'seminars' }, (payload) => {
              if (payload.eventType === 'INSERT') {
                setSeminars(prev => [payload.new, ...prev]);
              } else if (payload.eventType === 'UPDATE') {
                setSeminars(prev => prev.map(s => s.id === payload.new.id ? payload.new : s));
              } else if (payload.eventType === 'DELETE') {
                setSeminars(prev => prev.filter(s => s.id !== payload.old.id));
              }
            }).subscribe();

            setLoading(false);
          } catch (error) {
            console.error('Error loading data:', error);
            setLoading(false);
          }
        };

        loadAllData();

        return () => {
          if (sermonsChannel) sermonsChannel.unsubscribe();
          if (eventsChannel) eventsChannel.unsubscribe();
          if (announcementsChannel) announcementsChannel.unsubscribe();
          if (membersChannel) membersChannel.unsubscribe();
          if (mediasChannel) mediasChannel.unsubscribe();
          if (messagesChannel) messagesChannel.unsubscribe();
          if (ministriesChannel) ministriesChannel.unsubscribe();
          if (speakersChannel) speakersChannel.unsubscribe();
          if (seminarsChannel) seminarsChannel.unsubscribe();
        };
      }, []);

      const contextValue = {
        darkMode, setDarkMode,
        sermons, setSermons,
        events, setEvents,
        announcements, setAnnouncements,
        members, setMembers,
        medias, setMedias,
        messages, setMessages,
        ministries, setMinistries,
        speakers, setSpeakers,
        seminars, setSeminars,
        settings, setSettings,
        churchInfo, setChurchInfo,
        notificationLogs, setNotificationLogs,
        sundaySettings, setSundaySettings,
        loading
      };

      return (
        <AdminContext.Provider value={contextValue}>
          <div className="min-h-screen flex bg-white dark:bg-slate-950">
            <Sidebar activeSection={activeSection} setActiveSection={setActiveSection} />
            <main className="flex-1 overflow-y-auto">
              <Header onLogout={onLogout} />
              <div className="p-6 md:p-10">
                {loading ? (
                  <div className="flex items-center justify-center py-32">
                    <div className="text-center">
                      <div className="w-16 h-16 border-4 border-blue-600 border-t-transparent rounded-full animate-spin mx-auto mb-4"></div>
                      <p className="text-slate-600 dark:text-slate-400">Chargement...</p>
                    </div>
                  </div>
                ) : (
                  <>
                    {activeSection === 'sermons' && <SermonsSection />}
                    {activeSection === 'events' && <EventsSection />}
                    {activeSection === 'announcements' && <AnnouncementsSection />}
                    {activeSection === 'members' && <MembersSection />}
                    {activeSection === 'speakers' && <SpeakersSection />}
                    {activeSection === 'seminars' && <SeminarsSection />}
                    {activeSection === 'medias' && <MediasSection />}
                    {activeSection === 'messages' && <MessagesSection />}
                    {activeSection === 'ministries' && <MinistriesSection />}
                    {activeSection === 'notifications' && <NotificationsSection />}
                    {activeSection === 'churchInfo' && <ChurchInfoSection />}
                    {activeSection === 'settings' && <SettingsSection />}
                  </>
                )}
              </div>
            </main>
          </div>
        </AdminContext.Provider>
      );
    }

    // ============================================
    // SERMONS SECTION
    // ============================================
    function SermonsSection() {
      const { sermons } = useAdmin();
      const [showModal, setShowModal] = useState(false);
      const [editingItem, setEditingItem] = useState(null);
      const [searchTerm, setSearchTerm] = useState('');

      const filtered = useMemo(() => {
        if (!searchTerm) return sermons;
        const q = searchTerm.toLowerCase();
        return sermons.filter(s => 
          s.title?.toLowerCase().includes(q) || 
          s.speaker?.toLowerCase().includes(q)
        );
      }, [sermons, searchTerm]);

      const handleDelete = async (id) => {
        if (!confirm('Supprimer cette prédication ?')) return;
        const sb = initSupabase();
        const { error } = await sb.from('sermons').delete().eq('id', id);
        if (error) alert('Erreur: ' + error.message);
      };

      return (
        <div>
          <div className="flex items-center justify-between mb-6">
            <div className="flex-1 max-w-md">
              <input
                type="text"
                placeholder="Rechercher..."
                value={searchTerm}
                onChange={e => setSearchTerm(e.target.value)}
                className="w-full px-4 py-2 rounded-lg border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-900 text-slate-900 dark:text-white"
              />
            </div>
            <button
              onClick={() => { setEditingItem(null); setShowModal(true); }}
              className="ml-4 px-6 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition font-medium"
            >
              + Ajouter
            </button>
          </div>

          <div className="bg-white dark:bg-slate-900 rounded-lg border border-slate-200 dark:border-slate-800 overflow-hidden">
            <table className="w-full">
              <thead className="bg-slate-50 dark:bg-slate-800 border-b border-slate-200 dark:border-slate-700">
                <tr>
                  <th className="px-6 py-3 text-left text-xs font-medium text-slate-500 dark:text-slate-400 uppercase">Titre</th>
                  <th className="px-6 py-3 text-left text-xs font-medium text-slate-500 dark:text-slate-400 uppercase">Orateur</th>
                  <th className="px-6 py-3 text-left text-xs font-medium text-slate-500 dark:text-slate-400 uppercase">Date</th>
                  <th className="px-6 py-3 text-left text-xs font-medium text-slate-500 dark:text-slate-400 uppercase">Durée</th>
                  <th className="px-6 py-3 text-right text-xs font-medium text-slate-500 dark:text-slate-400 uppercase">Actions</th>
                </tr>
              </thead>
              <tbody className="divide-y divide-slate-200 dark:divide-slate-800">
                {filtered.map(sermon => (
                  <tr key={sermon.id} className="hover:bg-slate-50 dark:hover:bg-slate-800/50">
                    <td className="px-6 py-4 text-sm font-medium text-slate-900 dark:text-white">{sermon.title}</td>
                    <td className="px-6 py-4 text-sm text-slate-600 dark:text-slate-400">{sermon.speaker}</td>
                    <td className="px-6 py-4 text-sm text-slate-600 dark:text-slate-400">{formatDate(sermon.date)}</td>
                    <td className="px-6 py-4 text-sm text-slate-600 dark:text-slate-400">{sermon.duration}</td>
                    <td className="px-6 py-4 text-right space-x-2">
                      <button
                        onClick={() => { setEditingItem(sermon); setShowModal(true); }}
                        className="px-3 py-1 text-xs bg-slate-100 dark:bg-slate-800 text-slate-700 dark:text-slate-300 rounded hover:bg-slate-200 dark:hover:bg-slate-700"
                      >
                        Éditer
                      </button>
                      <button
                        onClick={() => handleDelete(sermon.id)}

    function SermonModal({ item, onClose }) {
      const { speakers, seminars } = useAdmin();
      const [formData, setFormData] = useState({
        title: item?.title || '',
        speaker: item?.speaker || '',
        speaker_id: item?.speaker_id || '',
        date: item?.date ? new Date(item.date).toISOString().split('T')[0] : new Date().toISOString().split('T')[0],
        duration: item?.duration || '',
        series: item?.series || '',
        year: item?.year || new Date().getFullYear(),
        audio_url: item?.audio_url || '',
        download_url: item?.download_url || '',
        cover_image: item?.cover_image || '',
        seminar_id: item?.seminar_id || '',
      });
      const [uploading, setUploading] = useState(false);
      const [uploadingCover, setUploadingCover] = useState(false);
      const [useExistingSpeaker, setUseExistingSpeaker] = useState(!!item?.speaker_id);
      const fileInputRef = useRef(null);
      const coverInputRef = useRef(null);

      const handleSpeakerSelect = (speakerId) => {
        if (speakerId) {
          const selectedSpeaker = speakers.find(s => s.id === speakerId);
          setFormData(prev => ({
            ...prev,
            speaker_id: speakerId,
            speaker: selectedSpeaker?.name || ''
          }));
        } else {
          setFormData(prev => ({ ...prev, speaker_id: '', speaker: '' }));
        }
      };

      const handleSubmit = async (e) => {
        e.preventDefault();
        setUploading(true);

        const sb = initSupabase();
        const data = {
          ...formData,
          year: parseInt(formData.year),
          seminar_id: formData.seminar_id || null // Convertir chaîne vide en null
        };

        let error;
        if (item) {
          ({ error } = await sb.from('sermons').update(data).eq('id', item.id));
        } else {
          ({ error } = await sb.from('sermons').insert([data]));
        }

        setUploading(false);
        if (error) {
          alert('Erreur: ' + error.message);
        } else {
          onClose();
        }
      };

      const handleFileUpload = async (file) => {
        if (!file) return;
        setUploading(true);

        const sb = initSupabase();
        const fileExt = file.name.split('.').pop();
        const fileName = `${Date.now()}.${fileExt}`;
        const filePath = `${fileName}`;

        const { data, error } = await sb.storage.from('sermons-audio').upload(filePath, file);

        if (error) {
          alert('Erreur upload: ' + error.message);
          setUploading(false);
          return;
        }

        const { data: { publicUrl } } = sb.storage.from('sermons-audio').getPublicUrl(filePath);
        setFormData(prev => ({ ...prev, audio_url: publicUrl, download_url: publicUrl }));
        setUploading(false);
      };

      const handleCoverUpload = async (file) => {
        if (!file) return;
        setUploadingCover(true);

        const sb = initSupabase();
        const fileExt = file.name.split('.').pop();
        const fileName = `cover_${Date.now()}.${fileExt}`;
        const filePath = `${fileName}`;

        const { data, error } = await sb.storage.from('sermon-covers').upload(filePath, file);

        if (error) {
          alert('Erreur upload image: ' + error.message);
          setUploadingCover(false);
          return;
        }

        const { data: { publicUrl } } = sb.storage.from('sermon-covers').getPublicUrl(filePath);
        setFormData(prev => ({ ...prev, cover_image: publicUrl }));
        setUploadingCover(false);
      };

      const handleDrop = (e) => {
        e.preventDefault();
        const file = e.dataTransfer.files[0];
        if (file) handleFileUpload(file);
      };

      return (
        <div className="fixed inset-0 z-50 flex items-center justify-center bg-black/60 p-4" onClick={onClose}>
          <div className="bg-white dark:bg-slate-900 rounded-lg max-w-2xl w-full max-h-[90vh] overflow-y-auto" onClick={e => e.stopPropagation()}>
            <div className="p-6 border-b border-slate-200 dark:border-slate-800">
              <h3 className="text-xl font-bold text-slate-900 dark:text-white">
                {item ? 'Modifier la prédication' : 'Nouvelle prédication'}
              </h3>
            </div>

            <form onSubmit={handleSubmit} className="p-6 space-y-4">
              <div>
                <label className="block text-sm font-medium mb-2 text-slate-900 dark:text-white">Titre *</label>
                <input
                  type="text"
                  required
                  value={formData.title}
                  onChange={e => setFormData({...formData, title: e.target.value})}
                  className="w-full px-4 py-2 rounded-lg border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-950 text-slate-900 dark:text-white"
                />
              </div>

              {/* Orateur Selection */}
              <div>
                <div className="flex items-center justify-between mb-2">
                  <label className="block text-sm font-medium text-slate-900 dark:text-white">Orateur *</label>
                  <label className="flex items-center gap-2 cursor-pointer">
                    <input
                      type="checkbox"
                      checked={useExistingSpeaker}
                      onChange={e => {
                        setUseExistingSpeaker(e.target.checked);
                        if (!e.target.checked) {
                          setFormData(prev => ({ ...prev, speaker_id: '' }));
                        }
                      }}
                      className="w-4 h-4 rounded"
                    />
                    <span className="text-xs text-slate-600 dark:text-slate-400">Utiliser un orateur existant</span>
                  </label>
                </div>

                {useExistingSpeaker ? (
                  <select
                    required
                    value={formData.speaker_id}
                    onChange={e => handleSpeakerSelect(e.target.value)}
                    className="w-full px-4 py-2 rounded-lg border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-950 text-slate-900 dark:text-white"
                  >
                    <option value="">-- Sélectionner un orateur --</option>
                    {speakers.map(s => (
                      <option key={s.id} value={s.id}>{s.name} {s.ministry ? `(${s.ministry})` : ''}</option>
                    ))}
                  </select>
                ) : (
                  <input

    function EventsSection() {
      const { events } = useAdmin();

      const filtered = useMemo(() => {
        let list = events;
        if (searchTerm) {

          list = list.filter(e => 
            e.title?.toLowerCase().includes(q) ||

    function EventModal({ item, onClose }) {
      const [formData, setFormData] = useState({
        title: item?.title || '',
        date: item?.date ? new Date(item.date).toISOString().split('T')[0] : new Date().toISOString().split('T')[0],
        time: item?.time || '',
        location: item?.location || '',
        description: item?.description || '',
        type: item?.type || '',
        image: item?.image || '',
      });
      const [uploading, setUploading] = useState(false);
      const fileInputRef = useRef(null);

      const handleSubmit = async (e) => {
        e.preventDefault();
        setUploading(true);
        
        const sb = initSupabase();
        const data = { ...formData };

        let error;
        if (item) {
          ({ error } = await sb.from('events').update(data).eq('id', item.id));
        } else {
          ({ error } = await sb.from('events').insert([data]));
        }

        setUploading(false);
        if (error) {
          alert('Erreur: ' + error.message);
        } else {
          onClose();
        }
      };

      const handleFileUpload = async (file) => {
        if (!file) return;
        setUploading(true);

        const sb = initSupabase();
        const fileExt = file.name.split('.').pop();
        const fileName = `${Date.now()}.${fileExt}`;
        const filePath = `${fileName}`;

        const { data, error } = await sb.storage.from('events-images').upload(filePath, file);

        if (error) {
          alert('Erreur upload: ' + error.message);
          setUploading(false);
          return;
        }

        const { data: { publicUrl } } = sb.storage.from('events-images').getPublicUrl(filePath);
        setFormData(prev => ({ ...prev, image: publicUrl }));
        setUploading(false);
      };

      const handleDrop = (e) => {
        e.preventDefault();
        const file = e.dataTransfer.files[0];
        if (file && file.type.startsWith('image/')) handleFileUpload(file);
      };

      return (
        <div className="fixed inset-0 z-50 flex items-center justify-center bg-black/60 p-4" onClick={onClose}>
          <div className="bg-white dark:bg-slate-900 rounded-lg max-w-2xl w-full max-h-[90vh] overflow-y-auto" onClick={e => e.stopPropagation()}>
            <div className="p-6 border-b border-slate-200 dark:border-slate-800">
              <h3 className="text-xl font-bold text-slate-900 dark:text-white">
                {item ? 'Modifier l\'événement' : 'Nouvel événement'}
              </h3>
            </div>

            <form onSubmit={handleSubmit} className="p-6 space-y-4">
              <div>
                <label className="block text-sm font-medium mb-2 text-slate-900 dark:text-white">Titre *</label>
                <input
                  type="text"

                  value={formData.title}
                  onChange={e => setFormData({...formData, title: e.target.value})}
                  className="w-full px-4 py-2 rounded-lg border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-950 text-slate-900 dark:text-white"

              </div>

              <div className="grid grid-cols-2 gap-4">
                <div>
                  <label className="block text-sm font-medium mb-2 text-slate-900 dark:text-white">Date *</label>
                  <input
                    type="date"

                    className="w-full px-4 py-2 rounded-lg border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-950 text-slate-900 dark:text-white"
                  />
                </div>
                <div>
                  <label className="block text-sm font-medium mb-2 text-slate-900 dark:text-white">Horaire</label>
                  <input
                    type="text"
                    placeholder="ex: 10h00 - 12h00"

                    className="w-full px-4 py-2 rounded-lg border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-950 text-slate-900 dark:text-white"
                  />
                </div>
              </div>

              <div>
                <label className="block text-sm font-medium mb-2 text-slate-900 dark:text-white">Type</label>

      const [formData, setFormData] = useState({
        title: item?.title || '',
        content: item?.content || '',

        type: item?.type || '',
        urgent: item?.urgent || false,
        image: item?.image || '',
      });
      const [saving, setSaving] = useState(false);
      const [uploadingImage, setUploadingImage] = useState(false);

      const handleImageUpload = async (file) => {
        if (!file || !file.type.startsWith('image/')) {
          alert('Veuillez sélectionner une image valide');
          return;
        }
        setUploadingImage(true);
        const sb = initSupabase();
        const fileExt = file.name.split('.').pop();
        const fileName = `announcement-${Date.now()}.${fileExt}`;
        const filePath = `announcements/${fileName}`;

        const { data, error } = await sb.storage.from('announcements-images').upload(filePath, file);

        if (error) {
          alert('Erreur upload image: ' + error.message);
          setUploadingImage(false);
          return;
        }

        const { data: { publicUrl } } = sb.storage.from('announcements-images').getPublicUrl(filePath);
        setFormData(prev => ({ ...prev, image: publicUrl }));
        setUploadingImage(false);
      };

      const handleSubmit = async (e) => {
        e.preventDefault();
        setSaving(true);

        const sb = initSupabase();
        const data = { ...formData };

        let error;
        if (item) {
          ({ error } = await sb.from('announcements').update(data).eq('id', item.id));
        } else {
          ({ error } = await sb.from('announcements').insert([data]));

    function MembersSection() {

        const categoriesObj = { 'Tous': 'Tous' };
        uniqueCats.sort().forEach(cat => {
          categoriesObj[cat] = cat.charAt(0).toUpperCase() + cat.slice(1);
        });
        return categoriesObj;
      }, [members]);

        if (categoryFilter === 'Tous') return members;
        return members.filter(m => m.category === categoryFilter);

        if (!confirm('Supprimer ce membre ?')) return;

    function MemberModal({ item, onClose }) {

        name: item?.name || '',
        role: item?.role || '',
        category: item?.category || '',
        photo: item?.photo || '',
      });

      const handleSubmit = async (e) => {
        e.preventDefault();
        setUploading(true);
        
        const sb = initSupabase();
        const data = { ...formData };

        let error;
        if (item) {
          ({ error } = await sb.from('members').update(data).eq('id', item.id));
        } else {
          ({ error } = await sb.from('members').insert([data]));
        }

        setUploading(false);
        if (error) {
          alert('Erreur: ' + error.message);
        } else {
          onClose();
        }
      };

      const handleFileUpload = async (file) => {
        if (!file) return;
        setUploading(true);

        const sb = initSupabase();
        const fileExt = file.name.split('.').pop();
        const fileName = `${Date.now()}.${fileExt}`;
        const filePath = `${fileName}`;

        const { data, error } = await sb.storage.from('members-photos').upload(filePath, file);

        if (error) {
          alert('Erreur upload: ' + error.message);
          setUploading(false);
          return;
        }

        const { data: { publicUrl } } = sb.storage.from('members-photos').getPublicUrl(filePath);
        setFormData(prev => ({ ...prev, photo: publicUrl }));
        setUploading(false);
      };

      const handleDrop = (e) => {
        e.preventDefault();
        const file = e.dataTransfer.files[0];
        if (file && file.type.startsWith('image/')) handleFileUpload(file);
      };

      return (
        <div className="fixed inset-0 z-50 flex items-center justify-center bg-black/60 p-4" onClick={onClose}>
          <div className="bg-white dark:bg-slate-900 rounded-lg max-w-xl w-full max-h-[90vh] overflow-y-auto" onClick={e => e.stopPropagation()}>

              <div>

                <input
                  type="text"
                  required
                  placeholder="ex: leadership, diacres, ministeres..."
                  value={formData.category}

                  className="w-full px-4 py-2 rounded-lg border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-950 text-slate-900 dark:text-white"
                />
              </div>

              <div>
                <label className="block text-sm font-medium mb-2 text-slate-900 dark:text-white">Photo</label>
                <div
                  onDrop={handleDrop}
                  onDragOver={e => e.preventDefault()}
                  className={cls(
                    "border-2 border-dashed rounded-lg p-8 text-center transition",
                    uploading ? "uploading" : "",
                    "border-slate-300 dark:border-slate-700 hover:border-blue-500 dark:hover:border-blue-500"
                  )}
                >
                  {formData.photo ? (
                    <div>
                      <img src={formData.photo} alt="Preview" className="w-32 h-32 object-cover rounded-full mx-auto mb-2" />
                      <button
                        type="button"
                        onClick={() => fileInputRef.current?.click()}
                        className="text-sm text-blue-600 dark:text-blue-400 hover:underline"

                        Remplacer
                      </button>

                      <button
                        type="button"

                  <input

    function MediaModal({ item, onClose }) {
      const [formData, setFormData] = useState({
        caption: item?.caption || '',
        url: item?.url || '',
        type: item?.type || 'image',
        thumbnail: item?.thumbnail || '',
        created_at: item?.created_at || new Date().toISOString(),
      });
      const [uploading, setUploading] = useState(false);
      const [uploadProgress, setUploadProgress] = useState(0);
      const fileInputRef = useRef(null);

      const handleSubmit = async (e) => {
        e.preventDefault();
        
        if (!formData.url) {
          alert('Veuillez uploader un fichier');
          return;
        }

        setUploading(true);
        
        try {
          const sb = initSupabase();
          const data = { 
            caption: formData.caption,
            url: formData.url,
            type: formData.type,
            thumbnail: formData.thumbnail
          };

          let result;
          if (item) {
            result = await sb.from('photos').update(data).eq('id', item.id).select();
          } else {
            result = await sb.from('photos').insert([data]).select();
          }

          if (result.error) {
            throw result.error;
          }

          onClose();
        } catch (error) {
          console.error('Erreur lors de l\'enregistrement:', error);
          alert('Erreur: ' + error.message);
        } finally {
          setUploading(false);
        }
      };

      const handleFileUpload = async (file) => {
        if (!file) return;
        
        const isImage = file.type.startsWith('image/');
        const isVideo = file.type.startsWith('video/');
        
        if (!isImage && !isVideo) {
          alert('Veuillez sélectionner une image ou une vidéo');
          return;
        }

        const maxSize = 100 * 1024 * 1024;
        if (file.size > maxSize) {
          alert('Le fichier est trop volumineux (max 100MB)');
          return;
        }

        setUploading(true);
        setUploadProgress(0);

        try {
          const sb = initSupabase();
          const fileExt = file.name.split('.').pop().toLowerCase();
          const fileName = `${Date.now()}_${Math.random().toString(36).substring(7)}.${fileExt}`;
          const bucketName = isVideo ? 'gallery-videos' : 'gallery-photos';

          const { data, error } = await sb.storage
            .from(bucketName)
            .upload(fileName, file, {
              cacheControl: '3600',
              upsert: false
            });

          if (error) throw error;

          const { data: { publicUrl } } = sb.storage.from(bucketName).getPublicUrl(fileName);
          
          setFormData(prev => ({ 
            ...prev, 
            url: publicUrl, 
            type: isVideo ? 'video' : 'image' 
          }));
          
          setUploadProgress(100);
        } catch (error) {
          console.error('Erreur upload:', error);
          alert('Erreur lors de l\'upload: ' + error.message);
        } finally {
          setUploading(false);
          setTimeout(() => setUploadProgress(0), 1000);
        }
      };

      const handleDrop = (e) => {
        e.preventDefault();
        const file = e.dataTransfer.files[0];
        if (file) handleFileUpload(file);
      };

      const handleDragOver = (e) => {
        e.preventDefault();
      };

      return (
        <div className="fixed inset-0 z-50 flex items-center justify-center bg-black/60 p-4" onClick={onClose}>
          <div className="bg-white dark:bg-slate-900 rounded-lg max-w-xl w-full max-h-[90vh] overflow-y-auto" onClick={e => e.stopPropagation()}>
            <div className="p-6 border-b border-slate-200 dark:border-slate-800">
              <h3 className="text-xl font-bold text-slate-900 dark:text-white">
                {item ? 'Modifier le média' : 'Nouveau média'}
              </h3>
            </div>

            <form onSubmit={handleSubmit} className="p-6 space-y-4">
              <div>
                <label className="block text-sm font-medium mb-2 text-slate-900 dark:text-white">
                  Légende *
                </label>
                <input
                  type="text"
                  required
                  value={formData.caption}
                  onChange={e => setFormData({...formData, caption: e.target.value})}
                  placeholder="ex: Culte de dimanche - Janvier 2025"
                  className="w-full px-4 py-2 rounded-lg border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-950 text-slate-900 dark:text-white"
                />
              </div>

              <div>
                <label className="block text-sm font-medium mb-2 text-slate-900 dark:text-white">
                  Fichier (Image ou Vidéo) *
                </label>
                <div
                  onDrop={handleDrop}
                  onDragOver={handleDragOver}
                  className={cls(
                    "border-2 border-dashed rounded-lg p-8 text-center transition",
                    uploading ? "opacity-60 pointer-events-none" : "",
                    "border-slate-300 dark:border-slate-700 hover:border-blue-500 dark:hover:border-blue-500"
                  )}
                >
                  {formData.url ? (
                    <div>
                      {formData.type === 'video' ? (
                        <video controls className="w-full max-h-48 rounded mb-3 bg-black">
                          <source src={formData.url} type="video/mp4" />
                        </video>
                      ) : (
                        <img 
                          src={formData.url} 
                          alt="Preview" 
                          className="w-full max-h-48 object-contain rounded mb-3"
                        />
                      )}
                      <p className="text-sm text-green-600 dark:text-green-400 mb-2">
                        ✓ {formData.type === 'video' ? 'Vidéo' : 'Image'} uploadée
                      </p>
                      <button
                        type="button"
                        onClick={() => fileInputRef.current?.click()}
                        disabled={uploading}
                        className="text-sm text-blue-600 dark:text-blue-400 hover:underline disabled:opacity-50"
                      >
                        Remplacer
                      </button>
                    </div>
                  ) : (
                    <div>
                      <div className="w-20 h-20 bg-slate-200 dark:bg-slate-800 rounded-lg mx-auto mb-3 flex items-center justify-center text-slate-400 p-4">
                        <CameraIcon />
                      </div>
                      <p className="text-sm text-slate-600 dark:text-slate-400 mb-2">
                        Glissez une image ou vidéo ici ou
                      </p>
                      <button
                        type="button"
                        onClick={() => fileInputRef.current?.click()}
                        disabled={uploading}
                        className="px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition text-sm disabled:opacity-50 disabled:cursor-not-allowed"
                      >
                        {uploading ? 'Upload en cours...' : 'Parcourir'}
                      </button>
                      <p className="text-xs text-slate-500 dark:text-slate-400 mt-3">
                        Images : JPG, PNG, GIF (max 100MB)<br />
                        Vidéos : MP4, WebM, MOV (max 100MB)
                      </p>
                    </div>
                  )}
                  
                  {uploading && uploadProgress > 0 && (
                    <div className="mt-4">
                      <div className="w-full bg-slate-200 dark:bg-slate-700 rounded-full h-2">
                        <div 
                          className="bg-blue-600 h-2 rounded-full transition-all duration-300"
                          style={{ width: `${uploadProgress}%` }}
                        />
                      </div>
                      <p className="text-xs text-slate-600 dark:text-slate-400 mt-2">
                        Upload: {uploadProgress}%
                      </p>
                    </div>
                  )}

                  <input
                    ref={fileInputRef}
                    type="file"
                    accept="image/*,video/*"
                    className="hidden"
                    onChange={e => handleFileUpload(e.target.files[0])}
                    disabled={uploading}
                  />
                </div>
              </div>

              <div className="flex items-center justify-end gap-3 pt-4 border-t border-slate-200 dark:border-slate-800">
                <button
                  type="button"
                  onClick={onClose}
                  disabled={uploading}
                  className="px-6 py-2 border border-slate-300 dark:border-slate-700 rounded-lg hover:bg-slate-100 dark:hover:bg-slate-800 transition text-slate-900 dark:text-white disabled:opacity-50"
                >
                  Annuler
                </button>
                <button
                  type="submit"
                  disabled={uploading || !formData.url}
                  className="px-6 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition disabled:opacity-50 disabled:cursor-not-allowed"
                >
                  {uploading ? 'Enregistrement...' : 'Enregistrer'}
                </button>
              </div>
            </form>
          </div>
        </div>
      );
    }

    function MinistryModal({ item, onClose }) {
      const [formData, setFormData] = useState({
        name: item?.name || '',
        tagline: item?.tagline || '',
        description: item?.description || '',
        leader: item?.leader || '',
        icon: item?.icon || 'users',
        cover_image: item?.cover_image || '',
        is_active: item?.is_active ?? true,
        display_order: item?.display_order ?? 0,
      });
      const [uploading, setUploading] = useState(false);
      const fileInputRef = useRef(null);

      const handleSubmit = async (e) => {
        e.preventDefault();
        setUploading(true);
        
        const sb = initSupabase();
        const data = { ...formData, display_order: parseInt(formData.display_order) };

        let error;
        if (item) {
          ({ error } = await sb.from('ministries').update(data).eq('id', item.id));
        } else {
          ({ error } = await sb.from('ministries').insert([data]));
        }

        setUploading(false);
        if (error) {
          alert('Erreur: ' + error.message);
        } else {
          onClose();
        }
      };

      const handleFileUpload = async (file) => {
        if (!file) return;
        setUploading(true);

        const sb = initSupabase();
        const fileExt = file.name.split('.').pop();
        const fileName = `${Date.now()}.${fileExt}`;
        const filePath = `${fileName}`;

        const { data, error } = await sb.storage.from('ministries-covers').upload(filePath, file);

        if (error) {
          alert('Erreur upload: ' + error.message);
          setUploading(false);
          return;
        }

        const { data: { publicUrl } } = sb.storage.from('ministries-covers').getPublicUrl(filePath);
        setFormData(prev => ({ ...prev, cover_image: publicUrl }));
        setUploading(false);
      };

      const handleDrop = (e) => {
        e.preventDefault();
        const file = e.dataTransfer.files[0];

    function SpeakersSection() {
      const { speakers, sermons } = useAdmin();
      const [showModal, setShowModal] = useState(false);
      const [editingItem, setEditingItem] = useState(null);
      const [searchTerm, setSearchTerm] = useState('');
      const [showSermonModal, setShowSermonModal] = useState(false);
      const [selectedSpeakerForSermon, setSelectedSpeakerForSermon] = useState(null);

      // Calculate stats for each speaker
      const speakerStats = useMemo(() => {
        const stats = {};
        speakers.forEach(s => {
          const speakerSermons = sermons.filter(sermon =>
            sermon.speaker_id === s.id || sermon.speaker?.toLowerCase() === s.name?.toLowerCase()
          );
          const totalSeconds = speakerSermons.reduce((acc, sermon) => {
            if (sermon.duration_seconds) return acc + sermon.duration_seconds;
            if (sermon.duration) {
              const parts = sermon.duration.split(':');
              if (parts.length === 2) return acc + parseInt(parts[0]) * 60 + parseInt(parts[1]);
            }
            return acc;
          }, 0);

          const hours = Math.floor(totalSeconds / 3600);
          const mins = Math.floor((totalSeconds % 3600) / 60);

          // Get unique dates for statistics
          const dates = speakerSermons.map(sermon => new Date(sermon.date));
          const years = [...new Set(dates.map(d => d.getFullYear()))].sort();
          const months = [...new Set(dates.map(d => `${d.getFullYear()}-${d.getMonth()}`))].length;

          stats[s.id] = {
            count: speakerSermons.length,
            totalMinutes: Math.floor(totalSeconds / 60),
            totalFormatted: hours > 0 ? `${hours}h ${mins}min` : `${mins} min`,
            years: years,
            monthsCount: months,
          };
        });
        return stats;
      }, [speakers, sermons]);

      const filtered = useMemo(() => {
        if (!searchTerm) return speakers;
        const q = searchTerm.toLowerCase();
        return speakers.filter(s =>
          s.name?.toLowerCase().includes(q) ||
          s.ministry?.toLowerCase().includes(q)
        );
      }, [speakers, searchTerm]);

      const handleDelete = async (id) => {
        if (!confirm('Supprimer cet orateur ? Les prédications associées ne seront pas supprimées.')) return;
        const sb = initSupabase();
        const { error } = await sb.from('speakers').delete().eq('id', id);
        if (error) alert('Erreur: ' + error.message);
      };

      return (
        <div>
          <div className="flex items-center justify-between mb-6">
            <div className="flex-1 max-w-md">
              <input
                type="text"
                placeholder="Rechercher un orateur..."
                value={searchTerm}
                onChange={e => setSearchTerm(e.target.value)}
                className="w-full px-4 py-2 rounded-lg border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-900 text-slate-900 dark:text-white"
              />
            </div>
            <button
              onClick={() => { setEditingItem(null); setShowModal(true); }}
              className="ml-4 px-6 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition font-medium"
            >
              + Ajouter
            </button>
          </div>

          <div className="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4">
            {filtered.map(speaker => {
              const stats = speakerStats[speaker.id] || { count: 0, totalFormatted: '0 min', years: [], monthsCount: 0 };
              return (
                <div key={speaker.id} className="group relative bg-white dark:bg-slate-900 rounded-lg border border-slate-200 dark:border-slate-800 overflow-hidden hover:shadow-lg transition">
                  <div className="flex">
                    {/* Photo */}
                    <div className="w-24 h-24 flex-shrink-0 overflow-hidden bg-slate-200 dark:bg-slate-800">
                      {speaker.photo_url ? (
                        <img src={speaker.photo_url} alt={speaker.name} className="w-full h-full object-cover" />
                      ) : (
                        <div className="w-full h-full flex items-center justify-center text-slate-400">
                          <UserIcon />
                        </div>
                      )}
                    </div>

                    {/* Info */}
                    <div className="flex-1 p-3 flex flex-col">
                      <h3 className="font-bold text-sm text-slate-900 dark:text-white mb-1 line-clamp-1">{speaker.name}</h3>
                      {speaker.ministry && (
                        <p className="text-xs text-slate-600 dark:text-slate-400 mb-2 line-clamp-1">{speaker.ministry}</p>
                      )}

                      {/* Stats */}
                      <div className="mt-auto flex items-center gap-3 text-xs">
                        <span className="inline-flex items-center gap-1 px-2 py-0.5 bg-blue-100 dark:bg-blue-900/30 text-blue-700 dark:text-blue-400 rounded">
                          <svg className="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M19 11a7 7 0 01-7 7m0 0a7 7 0 01-7-7m7 7v4m0 0H8m4 0h4m-4-8a3 3 0 01-3-3V5a3 3 0 116 0v6a3 3 0 01-3 3z" /></svg>
                          {stats.count}
                        </span>
                        <span className="inline-flex items-center gap-1 px-2 py-0.5 bg-green-100 dark:bg-green-900/30 text-green-700 dark:text-green-400 rounded">
                          <svg className="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>
                          {stats.totalFormatted}
                        </span>
                      </div>
                    </div>
                  </div>

                  {/* Stats détaillées */}
                  {stats.count > 0 && (
                    <div className="px-3 py-2 bg-slate-50 dark:bg-slate-800/50 border-t border-slate-200 dark:border-slate-800">
                      <div className="flex items-center justify-between text-xs text-slate-600 dark:text-slate-400">
                        <span>
                          {stats.years.length > 0 && (
                            <>Années: {stats.years.length === 1 ? stats.years[0] : `${stats.years[0]} - ${stats.years[stats.years.length - 1]}`}</>
                          )}
                        </span>
                        <span>{stats.monthsCount} mois actifs</span>
                      </div>
                    </div>
                  )}

                  {/* Actions */}
                  <div className="p-2 flex flex-col gap-1 border-t border-slate-200 dark:border-slate-800">
                    <button
                      onClick={() => { setSelectedSpeakerForSermon(speaker); setShowSermonModal(true); }}
                      className="w-full px-2 py-1.5 text-xs bg-green-100 dark:bg-green-900/30 text-green-700 dark:text-green-400 rounded hover:bg-green-200 dark:hover:bg-green-900/50 flex items-center justify-center gap-1"
                    >
                      <MicrophoneIcon /> Ajouter prédication
                    </button>
                    <div className="flex items-center gap-1">
                      <button
                        onClick={() => { setEditingItem(speaker); setShowModal(true); }}
                        className="flex-1 px-2 py-1.5 text-xs bg-slate-100 dark:bg-slate-800 text-slate-700 dark:text-slate-300 rounded hover:bg-slate-200 dark:hover:bg-slate-700"
                      >
                        Éditer
                      </button>
                      <button
                        onClick={() => handleDelete(speaker.id)}
                        className="px-2 py-1.5 text-xs bg-red-100 dark:bg-red-900/30 text-red-700 dark:text-red-400 rounded hover:bg-red-200 dark:hover:bg-red-900/50"
                      >
                        ✕
                      </button>
                    </div>
                  </div>
                </div>
              );
            })}
          </div>

          {showModal && <SpeakerModal item={editingItem} onClose={() => setShowModal(false)} />}
          {showSermonModal && <SermonModal item={{ speaker_id: selectedSpeakerForSermon?.id, speaker: selectedSpeakerForSermon?.name }} onClose={() => { setShowSermonModal(false); setSelectedSpeakerForSermon(null); }} />}
        </div>
      );
    }

    function SpeakerModal({ item, onClose }) {
      const [formData, setFormData] = useState({
        name: item?.name || '',
        bio: item?.bio || '',

        photo_url: item?.photo_url || '',
        social_links: item?.social_links || {},
      });
      const [uploading, setUploading] = useState(false);
      const fileInputRef = useRef(null);

      const handleSubmit = async (e) => {
        e.preventDefault();
        setUploading(true);

        const sb = initSupabase();
        const data = {
          ...formData,
          updated_at: new Date().toISOString(),
        };

        let error;
        if (item) {
          ({ error } = await sb.from('speakers').update(data).eq('id', item.id));
        } else {
          ({ error } = await sb.from('speakers').insert([data]));
        }

        setUploading(false);
        if (error) {
          alert('Erreur: ' + error.message);
        } else {
          onClose();
        }
      };

      const handleFileUpload = async (file) => {
        if (!file) return;
        setUploading(true);

        const sb = initSupabase();
        const fileExt = file.name.split('.').pop();
        const fileName = `speaker-${Date.now()}.${fileExt}`;
        const filePath = `${fileName}`;

        const { data, error } = await sb.storage.from('speakers-photos').upload(filePath, file);

        if (error) {
          alert('Erreur upload: ' + error.message);
          setUploading(false);
          return;
        }

        const { data: { publicUrl } } = sb.storage.from('speakers-photos').getPublicUrl(filePath);
        setFormData(prev => ({ ...prev, photo_url: publicUrl }));
        setUploading(false);
      };

      const handleDrop = (e) => {
        e.preventDefault();
        const file = e.dataTransfer.files[0];
        if (file && file.type.startsWith('image/')) handleFileUpload(file);
      };

      const updateSocialLink = (platform, value) => {
        setFormData(prev => ({
          ...prev,

    function SeminarModal({ item, speakers, onClose }) {
      const [formData, setFormData] = useState({
        name: item?.name || '',
        description: item?.description || '',
        speaker_id: item?.speaker_id || '',
        cover_image: item?.cover_image || '',
        start_date: item?.start_date ? new Date(item.start_date).toISOString().split('T')[0] : '',
        end_date: item?.end_date ? new Date(item.end_date).toISOString().split('T')[0] : '',
      });
      const [uploading, setUploading] = useState(false);
      const fileInputRef = useRef(null);

      const handleSubmit = async (e) => {
        e.preventDefault();
        setUploading(true);

        const sb = initSupabase();
        const data = {
          ...formData,
          speaker_id: formData.speaker_id || null,
          start_date: formData.start_date || null,
          end_date: formData.end_date || null,
          updated_at: new Date().toISOString(),
        };

        let error;
        if (item) {
          ({ error } = await sb.from('seminars').update(data).eq('id', item.id));
        } else {
          ({ error } = await sb.from('seminars').insert([data]));
        }

        setUploading(false);
        if (error) {
          alert('Erreur: ' + error.message);
        } else {
          onClose();
        }
      };

      const handleFileUpload = async (file) => {
        if (!file) return;
        setUploading(true);

        const sb = initSupabase();
        const fileExt = file.name.split('.').pop();
        const fileName = `seminar-${Date.now()}.${fileExt}`;
        const filePath = `${fileName}`;

        const { data, error } = await sb.storage.from('seminars-covers').upload(filePath, file);

        if (error) {
          alert('Erreur upload: ' + error.message);
          setUploading(false);
          return;
        }

        const { data: { publicUrl } } = sb.storage.from('seminars-covers').getPublicUrl(filePath);
        setFormData(prev => ({ ...prev, cover_image: publicUrl }));
        setUploading(false);
      };

      const handleDrop = (e) => {
        e.preventDefault();
        const file = e.dataTransfer.files[0];
        if (file && file.type.startsWith('image/')) handleFileUpload(file);
      };

      return (
        <div className="fixed inset-0 z-50 flex items-center justify-center bg-black/60 p-4" onClick={onClose}>
          <div className="bg-white dark:bg-slate-900 rounded-lg max-w-2xl w-full max-h-[90vh] overflow-y-auto" onClick={e => e.stopPropagation()}>
            <div className="p-6 border-b border-slate-200 dark:border-slate-800">
              <h3 className="text-xl font-bold text-slate-900 dark:text-white">
                {item ? 'Modifier le séminaire' : 'Nouveau séminaire'}
              </h3>
            </div>

            <form onSubmit={handleSubmit} className="p-6 space-y-4">
              <div>
                <label className="block text-sm font-medium mb-2 text-slate-900 dark:text-white">Nom du séminaire *</label>
                <input
                  type="text"
                  required
                  value={formData.name}
                  onChange={e => setFormData({...formData, name: e.target.value})}
                  className="w-full px-4 py-2 rounded-lg border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-950 text-slate-900 dark:text-white"
                />
              </div>

              <div>
                <label className="block text-sm font-medium mb-2 text-slate-900 dark:text-white">Description</label>
                <textarea
                  rows={3}
                  value={formData.description}
                  onChange={e => setFormData({...formData, description: e.target.value})}
                  className="w-full px-4 py-2 rounded-lg border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-950 text-slate-900 dark:text-white"
                />
              </div>

              <div>
                <label className="block text-sm font-medium mb-2 text-slate-900 dark:text-white">Orateur</label>
                <select
                  value={formData.speaker_id}
                  onChange={e => setFormData({...formData, speaker_id: e.target.value})}
                  className="w-full px-4 py-2 rounded-lg border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-950 text-slate-900 dark:text-white"
                >
                  <option value="">Aucun orateur sélectionné</option>
                  {speakers.map(speaker => (
                    <option key={speaker.id} value={speaker.id}>{speaker.name}</option>
                  ))}
                </select>
              </div>

              <div className="grid md:grid-cols-2 gap-4">
                <div>
                  <label className="block text-sm font-medium mb-2 text-slate-900 dark:text-white">Date de début</label>
                  <input
                    type="date"
                    value={formData.start_date}
                    onChange={e => setFormData({...formData, start_date: e.target.value})}
                    className="w-full px-4 py-2 rounded-lg border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-950 text-slate-900 dark:text-white"
                  />
                </div>
                <div>
                  <label className="block text-sm font-medium mb-2 text-slate-900 dark:text-white">Date de fin</label>
                  <input
                    type="date"
                    value={formData.end_date}
                    onChange={e => setFormData({...formData, end_date: e.target.value})}
                    className="w-full px-4 py-2 rounded-lg border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-950 text-slate-900 dark:text-white"
                  />
                </div>
              </div>

              <div>
                <label className="block text-sm font-medium mb-2 text-slate-900 dark:text-white">Image de couverture</label>
                <div
                  onDrop={handleDrop}
                  onDragOver={e => e.preventDefault()}
                  className={cls(
                    "border-2 border-dashed rounded-lg p-8 text-center transition",
                    uploading ? "uploading" : "",
                    "border-slate-300 dark:border-slate-700 hover:border-blue-500 dark:hover:border-blue-500"
                  )}
                >
                  {formData.cover_image ? (
                    <div>
                      <img src={formData.cover_image} alt="Preview" className="w-full max-w-md aspect-video object-cover rounded-lg mx-auto mb-2" />
                      <button
                        type="button"
                        onClick={() => fileInputRef.current?.click()}
                        className="text-sm text-blue-600 dark:text-blue-400 hover:underline"
                      >
                        Remplacer
                      </button>
                    </div>
                  ) : (
                    <div>
                      <div className="w-20 h-14 bg-slate-200 dark:bg-slate-800 rounded-lg mx-auto mb-3 flex items-center justify-center text-slate-400">
                        <FolderIcon />
                      </div>
                      <p className="text-sm text-slate-600 dark:text-slate-400 mb-2">
                        Glissez une image ici ou
                      </p>
                      <button
                        type="button"
                        onClick={() => fileInputRef.current?.click()}
                        className="px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition text-sm"
                      >
                        Parcourir
                      </button>
                    </div>
                  )}
                  <input
                    ref={fileInputRef}
                    type="file"
                    accept="image/*"
                    className="hidden"
                    onChange={e => handleFileUpload(e.target.files[0])}
                  />
                </div>
              </div>

              <div className="flex items-center justify-end gap-3 pt-4 border-t border-slate-200 dark:border-slate-800">
                <button
                  type="button"
                  onClick={onClose}
                  className="px-6 py-2 border border-slate-300 dark:border-slate-700 text-slate-700 dark:text-slate-300 rounded-lg hover:bg-slate-100 dark:hover:bg-slate-800 transition"
                >
                  Annuler
                </button>
                <button
                  type="submit"
                  disabled={uploading}
                  className="px-6 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition disabled:opacity-50 disabled:cursor-not-allowed"
                >
                  {uploading ? 'Enregistrement...' : 'Enregistrer'}
                </button>
              </div>
            </form>
          </div>
        </div>
      );
    }
