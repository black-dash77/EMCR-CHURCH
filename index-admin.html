    const HomeIcon = () => (

    const HandRaisedIcon = () => (

      </svg>
    );

    const GlobeAltIcon = () => (
      <svg className="w-full h-full" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M21 12a9 9 0 01-9 9m9-9a9 9 0 00-9-9m9 9H3m9 9a9 9 0 01-9-9m9 9c1.657 0 3-4.03 3-9s-1.343-9-3-9m0 18c-1.657 0-3-4.03-3-9s1.343-9 3-9m-9 9a9 9 0 019-9" />
      </svg>
    );

    const MINISTRY_ICONS = {
      'musical-note': MusicalNoteIcon,
      'users': UsersIcon,
      'microphone': MicrophoneIcon,
      'fire': FireIcon,
      'hand-raised': HandRaisedIcon,
      'globe-alt': GlobeAltIcon,
    };

    // ============================================
    // UTILITY FUNCTIONS
    // ============================================
    const cls = (...xs) => xs.filter(Boolean).join(' ');
    
    const formatDate = (date) => {
      const d = typeof date === 'string' ? new Date(date) : date;
      return d.toLocaleDateString('fr-FR', { year: 'numeric', month: '2-digit', day: '2-digit' });
    };

    const formatDateTime = (date) => {
      const d = typeof date === 'string' ? new Date(date) : date;
      return d.toLocaleString('fr-FR', { 
        year: 'numeric', 
        month: '2-digit', 
        day: '2-digit',
        hour: '2-digit',
        minute: '2-digit'
      });
    };

    // ============================================
    // CONTEXT
    // ============================================
    const AdminContext = createContext(null);
    const useAdmin = () => useContext(AdminContext);

    // ============================================
    // MAIN ADMIN APP
    // ============================================
    function AdminApp() {
      const [darkMode, setDarkMode] = useState(() => {
        const saved = localStorage.getItem('darkMode');
        return saved ? JSON.parse(saved) : false;
      });
      
      const [activeSection, setActiveSection] = useState('sermons');
      const [loading, setLoading] = useState(true);
      
      const [sermons, setSermons] = useState([]);
      const [events, setEvents] = useState([]);
      const [announcements, setAnnouncements] = useState([]);
      const [members, setMembers] = useState([]);
      const [medias, setMedias] = useState([]);
      const [messages, setMessages] = useState([]);
      const [ministries, setMinistries] = useState([]);

      useEffect(() => {
        document.documentElement.classList.toggle('dark', darkMode);
        localStorage.setItem('darkMode', JSON.stringify(darkMode));
      }, [darkMode]);

      useEffect(() => {
        let sermonsChannel, eventsChannel, announcementsChannel, membersChannel, mediasChannel, messagesChannel, ministriesChannel;

        const loadAllData = async () => {
          try {
            const sb = initSupabase();

            if (!sb) {
              console.log('Supabase not initialized');
              setLoading(false);
              return;
            }

            setLoading(true);

            const { data: sermonsData } = await sb.from('sermons').select('*').order('date', { ascending: false });
            if (sermonsData) setSermons(sermonsData);

            const { data: eventsData } = await sb.from('events').select('*').order('date', { ascending: true });
            if (eventsData) setEvents(eventsData);

            const { data: announcementsData } = await sb.from('announcements').select('*').order('date', { ascending: false });
            if (announcementsData) setAnnouncements(announcementsData);

            const { data: membersData } = await sb.from('members').select('*').order('name', { ascending: true });
            if (membersData) setMembers(membersData);

            const { data: mediasData } = await sb.from('photos').select('*').order('created_at', { ascending: false });
            if (mediasData) setMedias(mediasData);

            const { data: messagesData } = await sb.from('contact_messages').select('*').order('created_at', { ascending: false });
            if (messagesData) setMessages(messagesData);

            const { data: ministriesData } = await sb.from('ministries').select('*').order('display_order', { ascending: true });
            if (ministriesData) setMinistries(ministriesData);

            sermonsChannel = sb.channel('sermons-admin').on('postgres_changes', { event: '*', schema: 'public', table: 'sermons' }, (payload) => {
              if (payload.eventType === 'INSERT') setSermons(prev => [payload.new, ...prev]);
              else if (payload.eventType === 'UPDATE') setSermons(prev => prev.map(s => s.id === payload.new.id ? payload.new : s));
              else if (payload.eventType === 'DELETE') setSermons(prev => prev.filter(s => s.id !== payload.old.id));
            }).subscribe();

            eventsChannel = sb.channel('events-admin').on('postgres_changes', { event: '*', schema: 'public', table: 'events' }, (payload) => {
              if (payload.eventType === 'INSERT') setEvents(prev => [...prev, payload.new].sort((a,b) => new Date(a.date) - new Date(b.date)));
              else if (payload.eventType === 'UPDATE') setEvents(prev => prev.map(e => e.id === payload.new.id ? payload.new : e));
              else if (payload.eventType === 'DELETE') setEvents(prev => prev.filter(e => e.id !== payload.old.id));
            }).subscribe();

            announcementsChannel = sb.channel('announcements-admin').on('postgres_changes', { event: '*', schema: 'public', table: 'announcements' }, (payload) => {
              if (payload.eventType === 'INSERT') setAnnouncements(prev => [payload.new, ...prev]);
              else if (payload.eventType === 'UPDATE') setAnnouncements(prev => prev.map(a => a.id === payload.new.id ? payload.new : a));
              else if (payload.eventType === 'DELETE') setAnnouncements(prev => prev.filter(a => a.id !== payload.old.id));
            }).subscribe();

            membersChannel = sb.channel('members-admin').on('postgres_changes', { event: '*', schema: 'public', table: 'members' }, (payload) => {
              if (payload.eventType === 'INSERT') setMembers(prev => [...prev, payload.new].sort((a,b) => a.name.localeCompare(b.name)));
              else if (payload.eventType === 'UPDATE') setMembers(prev => prev.map(m => m.id === payload.new.id ? payload.new : m));
              else if (payload.eventType === 'DELETE') setMembers(prev => prev.filter(m => m.id !== payload.old.id));
            }).subscribe();

            mediasChannel = sb.channel('medias-admin').on('postgres_changes', { event: '*', schema: 'public', table: 'photos' }, (payload) => {
              if (payload.eventType === 'INSERT') setMedias(prev => [payload.new, ...prev]);
              else if (payload.eventType === 'UPDATE') setMedias(prev => prev.map(p => p.id === payload.new.id ? payload.new : p));
              else if (payload.eventType === 'DELETE') setMedias(prev => prev.filter(p => p.id !== payload.old.id));
            }).subscribe();

            messagesChannel = sb.channel('messages-admin').on('postgres_changes', { event: '*', schema: 'public', table: 'contact_messages' }, (payload) => {
              if (payload.eventType === 'INSERT') setMessages(prev => [payload.new, ...prev]);
              else if (payload.eventType === 'UPDATE') setMessages(prev => prev.map(m => m.id === payload.new.id ? payload.new : m));
              else if (payload.eventType === 'DELETE') setMessages(prev => prev.filter(m => m.id !== payload.old.id));
            }).subscribe();

            ministriesChannel = sb.channel('ministries-admin').on('postgres_changes', { event: '*', schema: 'public', table: 'ministries' }, (payload) => {
              if (payload.eventType === 'INSERT') {
                setMinistries(prev => [...prev, payload.new].sort((a,b) => a.display_order - b.display_order));
              } else if (payload.eventType === 'UPDATE') {
                setMinistries(prev => prev.map(m => m.id === payload.new.id ? payload.new : m).sort((a,b) => a.display_order - b.display_order));
              } else if (payload.eventType === 'DELETE') {
                setMinistries(prev => prev.filter(m => m.id !== payload.old.id));
              }
            }).subscribe();

            setLoading(false);
          } catch (error) {
            console.error('Error loading data:', error);
            setLoading(false);
          }
        };

        loadAllData();

        return () => {
          if (sermonsChannel) sermonsChannel.unsubscribe();
          if (eventsChannel) eventsChannel.unsubscribe();
          if (announcementsChannel) announcementsChannel.unsubscribe();
          if (membersChannel) membersChannel.unsubscribe();
          if (mediasChannel) mediasChannel.unsubscribe();
          if (messagesChannel) messagesChannel.unsubscribe();
          if (ministriesChannel) ministriesChannel.unsubscribe();
        };
      }, []);

      const contextValue = {
        darkMode, setDarkMode,
        sermons, setSermons,
        events, setEvents,
        announcements, setAnnouncements,
        members, setMembers,
        medias, setMedias,
        messages, setMessages,
        ministries, setMinistries,
        loading
      };

      return (
        <AdminContext.Provider value={contextValue}>
          <div className="min-h-screen flex bg-white dark:bg-slate-950">
            <Sidebar activeSection={activeSection} setActiveSection={setActiveSection} />
            <main className="flex-1 overflow-y-auto">
              <Header />
              <div className="p-6 md:p-10">
                {loading ? (
                  <div className="flex items-center justify-center py-32">
                    <div className="text-center">
                      <div className="w-16 h-16 border-4 border-blue-600 border-t-transparent rounded-full animate-spin mx-auto mb-4"></div>
                      <p className="text-slate-600 dark:text-slate-400">Chargement...</p>
                    </div>
                  </div>
                ) : (
                  <>
                    {activeSection === 'sermons' && <SermonsSection />}
                    {activeSection === 'events' && <EventsSection />}
                    {activeSection === 'announcements' && <AnnouncementsSection />}
                    {activeSection === 'members' && <MembersSection />}
                    {activeSection === 'medias' && <MediasSection />}
                    {activeSection === 'messages' && <MessagesSection />}
                    {activeSection === 'ministries' && <MinistriesSection />}
                  </>
                )}
              </div>
            </main>
          </div>
        </AdminContext.Provider>
      );
    }

    // ============================================
    // SIDEBAR COMPONENT
    // ============================================
    function Sidebar({ activeSection, setActiveSection }) {
      const { sermons, events, announcements, members, medias, messages, ministries } = useAdmin();

      const sections = [
        { id: 'sermons', icon: <MicrophoneIcon />, label: 'Prédications', count: sermons.length },
        { id: 'events', icon: <CalendarIcon />, label: 'Événements', count: events.length },
        { id: 'announcements', icon: <MegaphoneIcon />, label: 'Annonces', count: announcements.length },
        { id: 'members', icon: <UsersIcon />, label: 'Membres', count: members.length },
        { id: 'medias', icon: <CameraIcon />, label: 'Médias', count: medias.length },
        { id: 'ministries', icon: <MusicalNoteIcon />, label: 'Ministères', count: ministries.length },
        { id: 'messages', icon: <ChatIcon />, label: 'Messages', count: messages.length },
      ];

      return (
        <aside className="w-64 bg-slate-900 dark:bg-slate-950 border-r border-slate-800 flex flex-col">
          <div className="p-6 border-b border-slate-800">
            <h1 className="text-xl font-bold text-white">Admin EMCR</h1>
            <p className="text-xs text-slate-400 mt-1">Panneau d'administration</p>
          </div>
          
          <nav className="flex-1 p-4 space-y-1">
            {sections.map(section => (
              <button
                key={section.id}
                onClick={() => setActiveSection(section.id)}
                className={cls(
                  "w-full flex items-center justify-between px-4 py-3 rounded-lg text-sm font-medium transition",
                  activeSection === section.id
                    ? "bg-blue-600 text-white"
                    : "text-slate-300 hover:bg-slate-800 hover:text-white"
                )}
              >
                <span className="flex items-center gap-3">
                  {section.icon}
                  <span>{section.label}</span>
                </span>
                <span className={cls(
                  "px-2 py-0.5 rounded-full text-xs",
                  activeSection === section.id
                    ? "bg-white/20"
                    : "bg-slate-800"
                )}>
                  {section.count}
                </span>
              </button>
            ))}
          </nav>

          <div className="p-4 border-t border-slate-800">
            <a href="/" className="flex items-center gap-3 px-4 py-3 text-sm text-slate-300 hover:bg-slate-800 hover:text-white rounded-lg transition">
              <HomeIcon />
              <span>Retour au site</span>
            </a>
          </div>
        </aside>
      );
    }

    // ============================================
    // HEADER COMPONENT
    // ============================================
    function Header() {
      const { darkMode, setDarkMode } = useAdmin();

      return (
        <header className="bg-white dark:bg-slate-900 border-b border-slate-200 dark:border-slate-800 px-6 md:px-10 py-4">
          <div className="flex items-center justify-between">
            <div>
              <h2 className="text-2xl font-bold text-slate-900 dark:text-white">Tableau de bord</h2>
              <p className="text-sm text-slate-600 dark:text-slate-400 mt-1">
                Gérez votre contenu en temps réel
              </p>
            </div>
            <button
              onClick={() => setDarkMode(v => !v)}
              className="p-3 rounded-lg border border-slate-200 dark:border-slate-700 hover:bg-slate-100 dark:hover:bg-slate-800 transition"
              aria-label="Toggle dark mode"
            >
              {darkMode ? <MoonIcon /> : <SunIcon />}
            </button>
          </div>
        </header>
      );
    }

    // ============================================
    // SERMONS SECTION
    // ============================================
    function SermonsSection() {
      const { sermons } = useAdmin();
      const [showModal, setShowModal] = useState(false);
      const [editingItem, setEditingItem] = useState(null);
      const [searchTerm, setSearchTerm] = useState('');

      const filtered = useMemo(() => {
        if (!searchTerm) return sermons;
        const q = searchTerm.toLowerCase();
        return sermons.filter(s => 
          s.title?.toLowerCase().includes(q) || 
          s.speaker?.toLowerCase().includes(q)
        );
      }, [sermons, searchTerm]);

      const handleDelete = async (id) => {
        if (!confirm('Supprimer cette prédication ?')) return;
        const sb = initSupabase();
        const { error } = await sb.from('sermons').delete().eq('id', id);
        if (error) alert('Erreur: ' + error.message);
      };

      return (
        <div>
          <div className="flex items-center justify-between mb-6">
            <div className="flex-1 max-w-md">
              <input
                type="text"
                placeholder="Rechercher..."
                value={searchTerm}
                onChange={e => setSearchTerm(e.target.value)}
                className="w-full px-4 py-2 rounded-lg border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-900 text-slate-900 dark:text-white"
              />
            </div>
            <button

    function SermonModal({ item, onClose }) {
      const [formData, setFormData] = useState({
        title: item?.title || '',
        speaker: item?.speaker || '',
        date: item?.date ? new Date(item.date).toISOString().split('T')[0] : new Date().toISOString().split('T')[0],
        duration: item?.duration || '',
        series: item?.series || '',
        year: item?.year || new Date().getFullYear(),
        audio_url: item?.audio_url || '',
        download_url: item?.download_url || '',
        cover_image: item?.cover_image || '',
      });
      const [uploading, setUploading] = useState(false);
      const [uploadingCover, setUploadingCover] = useState(false);
      const fileInputRef = useRef(null);
      const coverInputRef = useRef(null);

      const handleSubmit = async (e) => {
        e.preventDefault();
        setUploading(true);
        
        const sb = initSupabase();
        const data = { ...formData, year: parseInt(formData.year) };

        let error;
        if (item) {
          ({ error } = await sb.from('sermons').update(data).eq('id', item.id));
        } else {
          ({ error } = await sb.from('sermons').insert([data]));
        }

        setUploading(false);
        if (error) {
          alert('Erreur: ' + error.message);
        } else {
          onClose();
        }
      };

      const handleFileUpload = async (file) => {
        if (!file) return;
        setUploading(true);

        const sb = initSupabase();
        const fileExt = file.name.split('.').pop();
        const fileName = `${Date.now()}.${fileExt}`;
        const filePath = `${fileName}`;

        const { data, error } = await sb.storage.from('sermons-audio').upload(filePath, file);

        if (error) {
          alert('Erreur upload: ' + error.message);
          setUploading(false);
          return;
        }

        const { data: { publicUrl } } = sb.storage.from('sermons-audio').getPublicUrl(filePath);
        setFormData(prev => ({ ...prev, audio_url: publicUrl, download_url: publicUrl }));
        setUploading(false);
      };

      const handleCoverUpload = async (file) => {
        if (!file) return;
        setUploadingCover(true);

        const sb = initSupabase();
        const fileExt = file.name.split('.').pop();
        const fileName = `cover_${Date.now()}.${fileExt}`;
        const filePath = `${fileName}`;

        const { data, error } = await sb.storage.from('sermon-covers').upload(filePath, file);

        if (error) {
          alert('Erreur upload image: ' + error.message);
          setUploadingCover(false);
          return;
        }

        const { data: { publicUrl } } = sb.storage.from('sermon-covers').getPublicUrl(filePath);
        setFormData(prev => ({ ...prev, cover_image: publicUrl }));
        setUploadingCover(false);
      };

      const handleDrop = (e) => {
        e.preventDefault();
        const file = e.dataTransfer.files[0];
        if (file) handleFileUpload(file);
      };

      return (
        <div className="fixed inset-0 z-50 flex items-center justify-center bg-black/60 p-4" onClick={onClose}>
          <div className="bg-white dark:bg-slate-900 rounded-lg max-w-2xl w-full max-h-[90vh] overflow-y-auto" onClick={e => e.stopPropagation()}>
            <div className="p-6 border-b border-slate-200 dark:border-slate-800">

            </div>

            <form onSubmit={handleSubmit} className="p-6 space-y-4">
              <div>
                <label className="block text-sm font-medium mb-2 text-slate-900 dark:text-white">Titre *</label>
                <input
                  type="text"
                  required
                  value={formData.title}
                  onChange={e => setFormData({...formData, title: e.target.value})}
                  className="w-full px-4 py-2 rounded-lg border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-950 text-slate-900 dark:text-white"
                />
              </div>

              <div className="grid grid-cols-2 gap-4">
                <div>
                  <label className="block text-sm font-medium mb-2 text-slate-900 dark:text-white">Orateur *</label>
                  <input
                    type="text"
                    required
                    value={formData.speaker}
                    onChange={e => setFormData({...formData, speaker: e.target.value})}
                    className="w-full px-4 py-2 rounded-lg border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-950 text-slate-900 dark:text-white"
                  />
                </div>
                <div>
                  <label className="block text-sm font-medium mb-2 text-slate-900 dark:text-white">Date *</label>
                  <input
                    type="date"
                    required
                    value={formData.date}
                    onChange={e => setFormData({...formData, date: e.target.value})}
                    className="w-full px-4 py-2 rounded-lg border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-950 text-slate-900 dark:text-white"
                  />
                </div>
              </div>

              <div className="grid grid-cols-2 gap-4">
                <div>
                  <label className="block text-sm font-medium mb-2 text-slate-900 dark:text-white">Durée</label>
                  <input
                    type="text"
                    placeholder="ex: 45:30"
                    value={formData.duration}
                    onChange={e => setFormData({...formData, duration: e.target.value})}
                    className="w-full px-4 py-2 rounded-lg border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-950 text-slate-900 dark:text-white"
                  />
                </div>
                <div>
                  <label className="block text-sm font-medium mb-2 text-slate-900 dark:text-white">Série</label>
                  <input
                    type="text"
                    value={formData.series}
                    onChange={e => setFormData({...formData, series: e.target.value})}
                    className="w-full px-4 py-2 rounded-lg border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-950 text-slate-900 dark:text-white"
                  />
                </div>
              </div>

              <div>
                <label className="block text-sm font-medium mb-2 text-slate-900 dark:text-white">Image de couverture</label>
                <div className="border-2 border-dashed rounded-lg p-4 text-center border-slate-300 dark:border-slate-700 hover:border-blue-500 dark:hover:border-blue-500 transition">
                  {formData.cover_image ? (
                    <div className="flex items-center gap-4">
                      <img src={formData.cover_image} alt="Cover" className="w-24 h-24 object-cover rounded-lg" />
                      <div className="flex-1 text-left">
                        <p className="text-sm text-green-600 dark:text-green-400 mb-2">✓ Image uploadée</p>
                        <button
                          type="button"
                          onClick={() => coverInputRef.current?.click()}
                          className="text-sm text-blue-600 dark:text-blue-400 hover:underline"
                        >
                          Remplacer
                        </button>
                        <button
                          type="button"
                          onClick={() => setFormData({...formData, cover_image: ''})}
                          className="text-sm text-red-600 dark:text-red-400 hover:underline ml-4"
                        >
                          Supprimer
                        </button>
                      </div>
                    </div>
                  ) : (
                    <div>
                      {uploadingCover ? (
                        <p className="text-sm text-slate-600 dark:text-slate-400">Upload en cours...</p>
                      ) : (
                        <>
                          <p className="text-sm text-slate-600 dark:text-slate-400 mb-2">
                            Format: JPG, PNG, WebP (recommandé: 500x500px)
                          </p>
                          <button
                            type="button"
                            onClick={() => coverInputRef.current?.click()}
                            className="px-4 py-2 bg-slate-200 dark:bg-slate-800 text-slate-700 dark:text-slate-300 rounded-lg hover:bg-slate-300 dark:hover:bg-slate-700 transition text-sm"
                          >
                            Choisir une image
                          </button>
                        </>
                      )}
                    </div>
                  )}
                  <input
                    ref={coverInputRef}
                    type="file"
                    accept="image/*"
                    className="hidden"
                    onChange={e => handleCoverUpload(e.target.files[0])}
                  />
                </div>
              </div>

              <div>
                <label className="block text-sm font-medium mb-2 text-slate-900 dark:text-white">Fichier audio</label>
                <div
                  onDrop={handleDrop}
                  onDragOver={e => e.preventDefault()}
                  className={cls(
                    "border-2 border-dashed rounded-lg p-8 text-center transition",
                    uploading ? "uploading" : "",
                    "border-slate-300 dark:border-slate-700 hover:border-blue-500 dark:hover:border-blue-500"
                  )}
                >
                  {formData.audio_url ? (
                    <div>
                      <p className="text-sm text-green-600 dark:text-green-400 mb-2">✓ Fichier uploadé</p>
                      <audio controls className="w-full mb-2">
                        <source src={formData.audio_url} />
                      </audio>
                      <button
                        type="button"
                        onClick={() => fileInputRef.current?.click()}
                        className="text-sm text-blue-600 dark:text-blue-400 hover:underline"
                      >
                        Remplacer
                      </button>
                    </div>
                  ) : (
                    <div>
                      <p className="text-sm text-slate-600 dark:text-slate-400 mb-2">
                        Glissez un fichier audio ici ou
                      </p>
                      <button
                        type="button"
                        onClick={() => fileInputRef.current?.click()}
                        className="px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition text-sm"
                      >
                        Parcourir
                      </button>
                    </div>
                  )}
                  <input
                    ref={fileInputRef}
                    type="file"
                    accept="audio/*"
                    className="hidden"
                    onChange={e => handleFileUpload(e.target.files[0])}
                  />
                </div>
              </div>

              <div className="flex items-center justify-end gap-3 pt-4 border-t border-slate-200 dark:border-slate-800">
                <button
                  type="button"
                  onClick={onClose}
                  className="px-6 py-2 border border-slate-300 dark:border-slate-700 rounded-lg hover:bg-slate-100 dark:hover:bg-slate-800 transition text-slate-900 dark:text-white"
                >
                  Annuler
                </button>
                <button
                  type="submit"
                  disabled={uploading}
                  className="px-6 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition disabled:opacity-50 disabled:cursor-not-allowed"
                >
                  {uploading ? 'Enregistrement...' : 'Enregistrer'}
                </button>
              </div>
            </form>
          </div>
        </div>
      );
    }
// ============================================

    function EventsSection() {
      const { events } = useAdmin();
      const [showModal, setShowModal] = useState(false);
      const [editingItem, setEditingItem] = useState(null);
      const [searchTerm, setSearchTerm] = useState('');
      const [typeFilter, setTypeFilter] = useState('Tous');

      const eventTypes = useMemo(() => {
        const types = [...new Set(events.map(e => e.type).filter(Boolean))];
        return ['Tous', ...types.sort()];
      }, [events]);

      const filtered = useMemo(() => {
        let list = events;
        if (searchTerm) {
          const q = searchTerm.toLowerCase();
          list = list.filter(e => 
            e.title?.toLowerCase().includes(q) || 
            e.location?.toLowerCase().includes(q)
          );
        }
        if (typeFilter !== 'Tous') {
          list = list.filter(e => e.type === typeFilter);
        }
        return list;
      }, [events, searchTerm, typeFilter]);

      const handleDelete = async (id) => {
        if (!confirm('Supprimer cet événement ?')) return;
        const sb = initSupabase();
        const { error } = await sb.from('events').delete().eq('id', id);
        if (error) alert('Erreur: ' + error.message);
      };

      return (
        <div>
          <div className="flex items-center justify-between mb-6">
            <div className="flex gap-3 flex-1">
              <input
                type="text"
                placeholder="Rechercher..."
                value={searchTerm}
                onChange={e => setSearchTerm(e.target.value)}
                className="w-full max-w-md px-4 py-2 rounded-lg border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-900 text-slate-900 dark:text-white"
              />
              <select
                value={typeFilter}
                onChange={e => setTypeFilter(e.target.value)}
                className="px-4 py-2 rounded-lg border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-900 text-slate-900 dark:text-white"
              >
                {eventTypes.map(type => <option key={type} value={type}>Type: {type}</option>)}
              </select>
            </div>
            <button
              onClick={() => { setEditingItem(null); setShowModal(true); }}
              className="ml-4 px-6 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition font-medium"
            >
              + Ajouter
            </button>
          </div>

          <div className="grid md:grid-cols-2 lg:grid-cols-3 gap-4">
            {filtered.map(event => (
              <div key={event.id} className="bg-white dark:bg-slate-900 rounded-lg border border-slate-200 dark:border-slate-800 overflow-hidden hover:shadow-lg transition">
                {event.image && (
                  <div className="aspect-video overflow-hidden bg-slate-200 dark:bg-slate-800">
                    <img src={event.image} alt={event.title} className="w-full h-full object-cover" />
                  </div>
                )}
                <div className="p-4">
                  <div className="flex items-center gap-2 text-xs text-slate-500 dark:text-slate-400 mb-2">
                    <span>{formatDate(event.date)}</span>
                    {event.type && (
                      <>
                        <span>•</span>
                        <span className="px-2 py-0.5 bg-blue-100 dark:bg-blue-900/30 text-blue-700 dark:text-blue-400 rounded">{event.type}</span>
                      </>
                    )}
                  </div>
                  <h3 className="font-bold text-slate-900 dark:text-white mb-2 line-clamp-2">{event.title}</h3>
                  <p className="text-sm text-slate-600 dark:text-slate-400 mb-1">{event.time}</p>
                  <p className="text-sm text-slate-600 dark:text-slate-400 line-clamp-2 mb-3">{event.location}</p>
                  <div className="flex items-center gap-2">
                    <button
                      onClick={() => { setEditingItem(event); setShowModal(true); }}
                      className="flex-1 px-3 py-1.5 text-xs bg-slate-100 dark:bg-slate-800 text-slate-700 dark:text-slate-300 rounded hover:bg-slate-200 dark:hover:bg-slate-700"
                    >
                      Éditer
                    </button>
                    <button
                      onClick={() => handleDelete(event.id)}
                      className="px-3 py-1.5 text-xs bg-red-100 dark:bg-red-900/30 text-red-700 dark:text-red-400 rounded hover:bg-red-200 dark:hover:bg-red-900/50"
                    >
                      Supprimer
                    </button>
                  </div>
                </div>
              </div>
            ))}
          </div>

          {showModal && <EventModal item={editingItem} onClose={() => setShowModal(false)} />}
        </div>
      );
    }

    function MemberModal({ item, onClose }) {
      const [formData, setFormData] = useState({
        name: item?.name || '',
        role: item?.role || '',
        category: item?.category || '',
        photo: item?.photo || '',
      });
      const [uploading, setUploading] = useState(false);
      const fileInputRef = useRef(null);

      const handleSubmit = async (e) => {
        e.preventDefault();
        setUploading(true);
        
        const sb = initSupabase();
        const data = { ...formData };

        let error;
        if (item) {
          ({ error } = await sb.from('members').update(data).eq('id', item.id));
        } else {
          ({ error } = await sb.from('members').insert([data]));
        }

        setUploading(false);
        if (error) {
          alert('Erreur: ' + error.message);
        } else {
          onClose();
        }
      };

      const handleFileUpload = async (file) => {
        if (!file) return;
        setUploading(true);

        const sb = initSupabase();
        const fileExt = file.name.split('.').pop();
        const fileName = `${Date.now()}.${fileExt}`;
        const filePath = `${fileName}`;

        const { data, error } = await sb.storage.from('members-photos').upload(filePath, file);

        if (error) {
          alert('Erreur upload: ' + error.message);
          setUploading(false);
          return;
        }

        const { data: { publicUrl } } = sb.storage.from('members-photos').getPublicUrl(filePath);
        setFormData(prev => ({ ...prev, photo: publicUrl }));
        setUploading(false);
      };

      const handleDrop = (e) => {
        e.preventDefault();
        const file = e.dataTransfer.files[0];
        if (file && file.type.startsWith('image/')) handleFileUpload(file);
      };

      return (
        <div className="fixed inset-0 z-50 flex items-center justify-center bg-black/60 p-4" onClick={onClose}>
          <div className="bg-white dark:bg-slate-900 rounded-lg max-w-xl w-full max-h-[90vh] overflow-y-auto" onClick={e => e.stopPropagation()}>

                />
              </div>

              <div>
                <label className="block text-sm font-medium mb-2 text-slate-900 dark:text-white">Rôle *</label>

                  type="text"

                  className="w-full px-4 py-2 rounded-lg border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-950 text-slate-900 dark:text-white"

              <div>

                  placeholder="ex: leadership, diacres, ministeres..."

                />

              <div>
                <label className="block text-sm font-medium mb-2 text-slate-900 dark:text-white">Photo</label>
                <div

                >
                  {formData.photo ? (

    function MediaModal({ item, onClose }) {
      const [formData, setFormData] = useState({
        caption: item?.caption || '',
        url: item?.url || '',
        type: item?.type || 'image',
        thumbnail: item?.thumbnail || '',
        created_at: item?.created_at || new Date().toISOString(),
      });
      const [uploading, setUploading] = useState(false);
      const [uploadProgress, setUploadProgress] = useState(0);
      const fileInputRef = useRef(null);

      const handleSubmit = async (e) => {
        e.preventDefault();
        
        if (!formData.url) {
          alert('Veuillez uploader un fichier');
          return;
        }

        setUploading(true);
        
        try {
          const sb = initSupabase();
          const data = { 
            caption: formData.caption,
            url: formData.url,
            type: formData.type,
            thumbnail: formData.thumbnail
          };

          let result;
          if (item) {
            result = await sb.from('photos').update(data).eq('id', item.id).select();
          } else {
            result = await sb.from('photos').insert([data]).select();
          }

          if (result.error) {
            throw result.error;
          }

          onClose();
        } catch (error) {
          console.error('Erreur lors de l\'enregistrement:', error);
          alert('Erreur: ' + error.message);
        } finally {
          setUploading(false);
        }
      };

      const handleFileUpload = async (file) => {
        if (!file) return;
        
        const isImage = file.type.startsWith('image/');
        const isVideo = file.type.startsWith('video/');
        
        if (!isImage && !isVideo) {
          alert('Veuillez sélectionner une image ou une vidéo');
          return;
        }

        const maxSize = 100 * 1024 * 1024;
        if (file.size > maxSize) {
          alert('Le fichier est trop volumineux (max 100MB)');
          return;
        }

        setUploading(true);
        setUploadProgress(0);

        try {
          const sb = initSupabase();
          const fileExt = file.name.split('.').pop().toLowerCase();
          const fileName = `${Date.now()}_${Math.random().toString(36).substring(7)}.${fileExt}`;
          const bucketName = isVideo ? 'gallery-videos' : 'gallery-photos';

          const { data, error } = await sb.storage
            .from(bucketName)
            .upload(fileName, file, {
              cacheControl: '3600',
              upsert: false
            });

          if (error) throw error;

          const { data: { publicUrl } } = sb.storage.from(bucketName).getPublicUrl(fileName);
          
          setFormData(prev => ({ 
            ...prev, 
            url: publicUrl, 
            type: isVideo ? 'video' : 'image' 
          }));
          
          setUploadProgress(100);
        } catch (error) {
          console.error('Erreur upload:', error);
          alert('Erreur lors de l\'upload: ' + error.message);
        } finally {
          setUploading(false);
          setTimeout(() => setUploadProgress(0), 1000);
        }
      };

      const handleDrop = (e) => {
        e.preventDefault();
        const file = e.dataTransfer.files[0];
        if (file) handleFileUpload(file);
      };

      const handleDragOver = (e) => {
        e.preventDefault();
      };

      return (
        <div className="fixed inset-0 z-50 flex items-center justify-center bg-black/60 p-4" onClick={onClose}>
          <div className="bg-white dark:bg-slate-900 rounded-lg max-w-xl w-full max-h-[90vh] overflow-y-auto" onClick={e => e.stopPropagation()}>
            <div className="p-6 border-b border-slate-200 dark:border-slate-800">
              <h3 className="text-xl font-bold text-slate-900 dark:text-white">
                {item ? 'Modifier le média' : 'Nouveau média'}
              </h3>
            </div>

            <form onSubmit={handleSubmit} className="p-6 space-y-4">
              <div>
                <label className="block text-sm font-medium mb-2 text-slate-900 dark:text-white">
                  Légende *
                </label>
                <input
                  type="text"
                  required
                  value={formData.caption}
                  onChange={e => setFormData({...formData, caption: e.target.value})}
                  placeholder="ex: Culte de dimanche - Janvier 2025"
                  className="w-full px-4 py-2 rounded-lg border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-950 text-slate-900 dark:text-white"
                />
              </div>

              <div>
                <label className="block text-sm font-medium mb-2 text-slate-900 dark:text-white">
                  Fichier (Image ou Vidéo) *
                </label>
                <div
                  onDrop={handleDrop}
                  onDragOver={handleDragOver}
                  className={cls(
                    "border-2 border-dashed rounded-lg p-8 text-center transition",
                    uploading ? "opacity-60 pointer-events-none" : "",
                    "border-slate-300 dark:border-slate-700 hover:border-blue-500 dark:hover:border-blue-500"
                  )}
                >
                  {formData.url ? (
                    <div>
                      {formData.type === 'video' ? (
                        <video controls className="w-full max-h-48 rounded mb-3 bg-black">
                          <source src={formData.url} type="video/mp4" />
                        </video>
                      ) : (
                        <img 
                          src={formData.url} 
                          alt="Preview" 
                          className="w-full max-h-48 object-contain rounded mb-3"
                        />
                      )}
                      <p className="text-sm text-green-600 dark:text-green-400 mb-2">
                        ✓ {formData.type === 'video' ? 'Vidéo' : 'Image'} uploadée
                      </p>
                      <button
                        type="button"
                        onClick={() => fileInputRef.current?.click()}
                        disabled={uploading}
                        className="text-sm text-blue-600 dark:text-blue-400 hover:underline disabled:opacity-50"
                      >
                        Remplacer
                      </button>
                    </div>
                  ) : (
                    <div>
                      <div className="w-20 h-20 bg-slate-200 dark:bg-slate-800 rounded-lg mx-auto mb-3 flex items-center justify-center text-slate-400 p-4">
                        <CameraIcon />
                      </div>
                      <p className="text-sm text-slate-600 dark:text-slate-400 mb-2">
                        Glissez une image ou vidéo ici ou
                      </p>
                      <button
                        type="button"
                        onClick={() => fileInputRef.current?.click()}
                        disabled={uploading}
                        className="px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition text-sm disabled:opacity-50 disabled:cursor-not-allowed"
                      >
                        {uploading ? 'Upload en cours...' : 'Parcourir'}
                      </button>
                      <p className="text-xs text-slate-500 dark:text-slate-400 mt-3">
                        Images : JPG, PNG, GIF (max 100MB)<br />
                        Vidéos : MP4, WebM, MOV (max 100MB)
                      </p>
                    </div>
                  )}
                  
                  {uploading && uploadProgress > 0 && (
                    <div className="mt-4">
                      <div className="w-full bg-slate-200 dark:bg-slate-700 rounded-full h-2">
                        <div 
                          className="bg-blue-600 h-2 rounded-full transition-all duration-300"
                          style={{ width: `${uploadProgress}%` }}
                        />
                      </div>
                      <p className="text-xs text-slate-600 dark:text-slate-400 mt-2">
                        Upload: {uploadProgress}%
                      </p>
                    </div>
                  )}

                  <input
                    ref={fileInputRef}
                    type="file"
                    accept="image/*,video/*"
                    className="hidden"
                    onChange={e => handleFileUpload(e.target.files[0])}
                    disabled={uploading}
                  />
                </div>
              </div>

              <div className="flex items-center justify-end gap-3 pt-4 border-t border-slate-200 dark:border-slate-800">
                <button
                  type="button"
                  onClick={onClose}
                  disabled={uploading}
                  className="px-6 py-2 border border-slate-300 dark:border-slate-700 rounded-lg hover:bg-slate-100 dark:hover:bg-slate-800 transition text-slate-900 dark:text-white disabled:opacity-50"
                >
                  Annuler
                </button>
                <button
                  type="submit"
                  disabled={uploading || !formData.url}
                  className="px-6 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition disabled:opacity-50 disabled:cursor-not-allowed"
                >
                  {uploading ? 'Enregistrement...' : 'Enregistrer'}
                </button>
              </div>
            </form>
          </div>
        </div>
      );
    }

        let error;
        if (item) {
          ({ error } = await sb.from('ministries').update(data).eq('id', item.id));
        } else {
          ({ error } = await sb.from('ministries').insert([data]));
        }

        setUploading(false);
        if (error) {
          alert('Erreur: ' + error.message);
        } else {
          onClose();
        }
      };

      const handleFileUpload = async (file) => {
        if (!file) return;
        setUploading(true);

        const sb = initSupabase();
        const fileExt = file.name.split('.').pop();
        const fileName = `${Date.now()}.${fileExt}`;
        const filePath = `${fileName}`;

        const { data, error } = await sb.storage.from('ministries-covers').upload(filePath, file);

        if (error) {
          alert('Erreur upload: ' + error.message);
          setUploading(false);
          return;
        }

        const { data: { publicUrl } } = sb.storage.from('ministries-covers').getPublicUrl(filePath);
        setFormData(prev => ({ ...prev, cover_image: publicUrl }));
        setUploading(false);
      };

      const handleDrop = (e) => {
        e.preventDefault();
        const file = e.dataTransfer.files[0];
        if (file && file.type.startsWith('image/')) handleFileUpload(file);
      };

      return (
        <div className="fixed inset-0 z-50 flex items-center justify-center bg-black/60 p-4" onClick={onClose}>
          <div className="bg-white dark:bg-slate-900 rounded-lg max-w-2xl w-full max-h-[90vh] overflow-y-auto" onClick={e => e.stopPropagation()}>
            <div className="p-6 border-b border-slate-200 dark:border-slate-800">
              <h3 className="text-xl font-bold text-slate-900 dark:text-white">
                {item ? 'Modifier le ministère' : 'Nouveau ministère'}
              </h3>
            </div>

            <form onSubmit={handleSubmit} className="p-6 space-y-4">
              <div>
                <label className="block text-sm font-medium mb-2 text-slate-900 dark:text-white">Nom *</label>
                <input
                  type="text"
                  required
                  value={formData.name}
                  onChange={e => setFormData({...formData, name: e.target.value})}
                  placeholder="ex: Louange & Adoration"
                  className="w-full px-4 py-2 rounded-lg border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-950 text-slate-900 dark:text-white"
                />
              </div>

              <div>
                <label className="block text-sm font-medium mb-2 text-slate-900 dark:text-white">Slogan</label>
                <input
                  type="text"
                  value={formData.tagline}
                  onChange={e => setFormData({...formData, tagline: e.target.value})}
                  placeholder="ex: Célébrer Dieu par la musique"
                  className="w-full px-4 py-2 rounded-lg border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-950 text-slate-900 dark:text-white"
                />
              </div>

              <div>
                <label className="block text-sm font-medium mb-2 text-slate-900 dark:text-white">Description</label>
                <textarea
                  rows="4"
                  value={formData.description}
                  onChange={e => setFormData({...formData, description: e.target.value})}
                  placeholder="Décrivez la mission et les activités du ministère..."
                  className="w-full px-4 py-2 rounded-lg border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-950 text-slate-900 dark:text-white"
                />
              </div>

              <div className="grid grid-cols-2 gap-4">
                <div>
                  <label className="block text-sm font-medium mb-2 text-slate-900 dark:text-white">Responsable</label>
                  <input
                    type="text"
                    value={formData.leader}
                    onChange={e => setFormData({...formData, leader: e.target.value})}
                    placeholder="ex: Jean Dupont"
                    className="w-full px-4 py-2 rounded-lg border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-950 text-slate-900 dark:text-white"
                  />
                </div>
                <div>
                  <label className="block text-sm font-medium mb-2 text-slate-900 dark:text-white">Icône</label>
                  <select
                    value={formData.icon}
                    onChange={e => setFormData({...formData, icon: e.target.value})}
                    className="w-full px-4 py-2 rounded-lg border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-950 text-slate-900 dark:text-white"
                  >
                    <option value="musical-note">🎵 Musical Note</option>
                    <option value="users">👥 Users</option>
                    <option value="microphone">🎤 Microphone</option>
                    <option value="fire">🔥 Fire</option>
                    <option value="hand-raised">✋ Hand Raised</option>
                    <option value="globe-alt">🌍 Globe</option>
                  </select>
                </div>
              </div>

              <div>
                <label className="block text-sm font-medium mb-2 text-slate-900 dark:text-white">Ordre d'affichage</label>
                <input
                  type="number"
                  value={formData.display_order}
                  onChange={e => setFormData({...formData, display_order: e.target.value})}
                  className="w-full px-4 py-2 rounded-lg border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-950 text-slate-900 dark:text-white"
                />
              </div>

              <div>
                <label className="block text-sm font-medium mb-2 text-slate-900 dark:text-white">Image de couverture</label>
                <div
                  onDrop={handleDrop}
                  onDragOver={e => e.preventDefault()}
                  className={cls(
                    "border-2 border-dashed rounded-lg p-8 text-center transition",
                    uploading ? "uploading" : "",
                    "border-slate-300 dark:border-slate-700 hover:border-blue-500 dark:hover:border-blue-500"
                  )}
                >
                  {formData.cover_image ? (
                    <div>
                      <img src={formData.cover_image} alt="Preview" className="w-full h-40 object-cover rounded mb-2" />
                      <button
                        type="button"
                        onClick={() => fileInputRef.current?.click()}
                        className="text-sm text-blue-600 dark:text-blue-400 hover:underline"
                      >
                        Remplacer
                      </button>
                    </div>
                  ) : (
                    <div>
                      <p className="text-sm text-slate-600 dark:text-slate-400 mb-2">
                        Glissez une image ici ou
                      </p>
                      <button
                        type="button"
                        onClick={() => fileInputRef.current?.click()}
                        className="px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition text-sm"
                      >
                        Parcourir
                      </button>
                    </div>
                  )}
                  <input
                    ref={fileInputRef}
                    type="file"
                    accept="image/*"
                    className="hidden"
                    onChange={e => handleFileUpload(e.target.files[0])}
                  />
                </div>
              </div>

              <div>
                <label className="flex items-center gap-3 cursor-pointer">
                  <input
                    type="checkbox"
                    checked={formData.is_active}
                    onChange={e => setFormData({...formData, is_active: e.target.checked})}
                    className="w-5 h-5 rounded border-slate-300 dark:border-slate-700"
                  />
                  <span className="text-sm font-medium text-slate-900 dark:text-white">
                    Actif (visible sur le site)
                  </span>
                </label>
              </div>

              <div className="flex items-center justify-end gap-3 pt-4 border-t border-slate-200 dark:border-slate-800">
                <button
                  type="button"
                  onClick={onClose}
                  className="px-6 py-2 border border-slate-300 dark:border-slate-700 rounded-lg hover:bg-slate-100 dark:hover:bg-slate-800 transition text-slate-900 dark:text-white"
                >
                  Annuler
                </button>
                <button
                  type="submit"
                  disabled={uploading}
                  className="px-6 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition disabled:opacity-50 disabled:cursor-not-allowed"
                >
                  {uploading ? 'Enregistrement...' : 'Enregistrer'}
                </button>
              </div>
            </form>
          </div>
        </div>
      );
    }

    // ============================================
    // RENDER APP
    // ============================================
    ReactDOM.createRoot(document.getElementById('root')).render(<AdminApp />);
  </script>
</body>
</html>
