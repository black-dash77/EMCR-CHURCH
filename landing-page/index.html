<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EMCR Church - Télécharger l'application</title>
    <meta name="description" content="Téléchargez l'application EMCR Church pour écouter des prédications édifiantes.">

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website">
    <meta property="og:title" content="EMCR Church">
    <meta property="og:description" content="Écoutez des prédications édifiantes sur l'app EMCR Church">
    <meta property="og:image" content="https://emcr-church.netlify.app/og-image.png">

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image">

    <!-- App Store Smart Banner (iOS) -->
    <meta name="apple-itunes-app" content="app-id=YOUR_APP_STORE_ID">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: #000000;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            color: #fff;
        }

        .container {
            text-align: center;
            max-width: 400px;
            width: 100%;
        }

        .logo {
            width: 120px;
            height: 120px;
            border-radius: 28px;
            margin: 0 auto 24px;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(26, 75, 255, 0.3);
        }

        .logo img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        h1 {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 12px;
        }

        .subtitle {
            color: rgba(255, 255, 255, 0.7);
            font-size: 16px;
            margin-bottom: 32px;
            line-height: 1.5;
        }

        .sermon-card {
            background: rgba(255, 255, 255, 0.08);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 32px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            display: none;
        }

        .sermon-card.visible {
            display: block;
        }

        .sermon-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .sermon-speaker {
            color: rgba(255, 255, 255, 0.6);
            font-size: 14px;
        }

        .buttons {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            padding: 16px 24px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            text-decoration: none;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .btn:hover {
            transform: translateY(-2px);
        }

        .btn-ios {
            background: #fff;
            color: #000;
        }

        .btn-ios:hover {
            box-shadow: 0 10px 30px rgba(255, 255, 255, 0.2);
        }

        .btn-android {
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .btn-android:hover {
            background: rgba(255, 255, 255, 0.15);
        }

        .btn-open {
            background: linear-gradient(135deg, #1DB954 0%, #1ed760 100%);
            color: #fff;
            margin-bottom: 8px;
        }

        .btn-open:hover {
            box-shadow: 0 10px 30px rgba(29, 185, 84, 0.3);
        }

        .icon {
            width: 24px;
            height: 24px;
        }

        .divider {
            display: flex;
            align-items: center;
            gap: 16px;
            margin: 24px 0;
            color: rgba(255, 255, 255, 0.4);
            font-size: 14px;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: rgba(255, 255, 255, 0.1);
        }

        .footer {
            margin-top: 40px;
            color: rgba(255, 255, 255, 0.4);
            font-size: 12px;
        }

        .loading {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 20px;
            color: rgba(255, 255, 255, 0.6);
        }

        .spinner {
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-top-color: #1DB954;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">
            <img src="/icon.png" alt="EMCR Church">
        </div>

        <h1>EMCR Church</h1>
        <p class="subtitle">Écoutez des prédications édifiantes pour fortifier votre foi</p>

        <div class="sermon-card" id="sermonCard">
            <div class="sermon-title" id="sermonTitle">Chargement...</div>
            <div class="sermon-speaker" id="sermonSpeaker"></div>
        </div>

        <div class="buttons">
            <a href="#" class="btn btn-open" id="openAppBtn" style="display: none;">
                <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <polygon points="5 3 19 12 5 21 5 3"></polygon>
                </svg>
                Ouvrir dans l'app
            </a>

            <a href="https://apps.apple.com/app/emcr-church/idYOUR_APP_ID" class="btn btn-ios" id="iosBtn">
                <svg class="icon" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M18.71 19.5c-.83 1.24-1.71 2.45-3.05 2.47-1.34.03-1.77-.79-3.29-.79-1.53 0-2 .77-3.27.82-1.31.05-2.3-1.32-3.14-2.53C4.25 17 2.94 12.45 4.7 9.39c.87-1.52 2.43-2.48 4.12-2.51 1.28-.02 2.5.87 3.29.87.78 0 2.26-1.07 3.81-.91.65.03 2.47.26 3.64 1.98-.09.06-2.17 1.28-2.15 3.81.03 3.02 2.65 4.03 2.68 4.04-.03.07-.42 1.44-1.38 2.83M13 3.5c.73-.83 1.94-1.46 2.94-1.5.13 1.17-.34 2.35-1.04 3.19-.69.85-1.83 1.51-2.95 1.42-.15-1.15.41-2.35 1.05-3.11z"/>
                </svg>
                Télécharger sur App Store
            </a>

            <a href="https://play.google.com/store/apps/details?id=com.emcr.church" class="btn btn-android" id="androidBtn">
                <svg class="icon" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M3,20.5V3.5C3,2.91 3.34,2.39 3.84,2.15L13.69,12L3.84,21.85C3.34,21.6 3,21.09 3,20.5M16.81,15.12L6.05,21.34L14.54,12.85L16.81,15.12M20.16,10.81C20.5,11.08 20.75,11.5 20.75,12C20.75,12.5 20.53,12.9 20.18,13.18L17.89,14.5L15.39,12L17.89,9.5L20.16,10.81M6.05,2.66L16.81,8.88L14.54,11.15L6.05,2.66Z"/>
                </svg>
                Télécharger sur Google Play
            </a>
        </div>

        <div class="footer">
            <p>EMCR Church - Église Missionnaire du Christ Roi</p>
            <p style="margin-top: 12px;">
                <a href="/privacy-policy.html" style="color: rgba(255,255,255,0.5); text-decoration: none; margin: 0 8px;">Confidentialité</a>
                |
                <a href="/terms-of-service.html" style="color: rgba(255,255,255,0.5); text-decoration: none; margin: 0 8px;">Conditions</a>
            </p>
        </div>
    </div>

    <script>
        // Extraire l'ID du sermon de l'URL
        const path = window.location.pathname;
        const sermonMatch = path.match(/\/sermon\/([^\/]+)/);
        const sermonId = sermonMatch ? sermonMatch[1] : null;

        // Détecter la plateforme
        const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent);
        const isAndroid = /Android/.test(navigator.userAgent);

        // URL du deep link
        const appScheme = 'emcr://';
        const deepLink = sermonId ? `${appScheme}sermon/${sermonId}` : appScheme;

        // Afficher le bouton "Ouvrir dans l'app" si on a un sermon
        if (sermonId) {
            const openAppBtn = document.getElementById('openAppBtn');
            openAppBtn.style.display = 'flex';
            openAppBtn.href = deepLink;

            // Afficher la carte du sermon
            document.getElementById('sermonCard').classList.add('visible');

            // Essayer d'ouvrir l'app automatiquement sur mobile
            if (isIOS || isAndroid) {
                setTimeout(() => {
                    window.location.href = deepLink;
                }, 100);
            }
        }

        // Afficher les deux boutons sur tous les appareils
        // pour que la personne puisse partager le lien avec quelqu'un sur une autre plateforme

        // Charger les infos du sermon depuis Supabase (optionnel)
        if (sermonId) {
            const SUPABASE_URL = 'https://zeurbmqrdoncjdmuzthl.supabase.co';
            const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InpldXJibXFyZG9uY2pkbXV6dGhsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Njg4MjA1NzksImV4cCI6MjA4NDM5NjU3OX0.uXoH7m8eXnpSvQRn1xc5pBRjcDK84H_hAHl9ulbDSlU';

            fetch(`${SUPABASE_URL}/rest/v1/sermons?id=eq.${sermonId}&select=title,speaker`, {
                headers: {
                    'apikey': SUPABASE_ANON_KEY,
                    'Authorization': `Bearer ${SUPABASE_ANON_KEY}`
                }
            })
            .then(res => res.json())
            .then(data => {
                if (data && data[0]) {
                    document.getElementById('sermonTitle').textContent = data[0].title;
                    document.getElementById('sermonSpeaker').textContent = data[0].speaker;

                    // Mettre à jour les meta tags dynamiquement
                    document.title = `${data[0].title} - EMCR Church`;
                } else {
                    document.getElementById('sermonCard').classList.remove('visible');
                }
            })
            .catch(() => {
                document.getElementById('sermonCard').classList.remove('visible');
            });
        }
    </script>
</body>
</html>
